<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kiosko USFQ Galápagos</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #02080e; overflow: hidden; }
  /* OJO: nada de `inset` en el camino crítico — requiere Chrome 87+ y en las TVs LG
     viejas se descarta, colapsando #stage a 0×0 (pantalla "azul"). Offsets explícitos. */
  #stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; background: #02080e; }
  #kiosk { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px;
    -webkit-transform-origin: 0 0; transform-origin: 0 0;
    color: var(--color-paper); font-family: var(--font-sans);
    display: grid; grid-template-columns: 540px 1fr;
    background: radial-gradient(120% 95% at 12% 0%, #103247 0%, #0a2434 42%, #06141e 76%, #030d14 100%);
    overflow: hidden; }

  /* ===== LEFT ===== */
  #rail { position: relative; padding: 44px 36px 30px; display: flex; flex-direction: column;
    background: linear-gradient(180deg, rgba(7,24,35,0.45), rgba(2,9,15,0.7)); border-right: 1px solid var(--border-default); }
  .top { display: flex; align-items: flex-start; justify-content: space-between; }
  .logo { height: 54px; }
  .clk-wrap { text-align: right; }
  .clk { font-size: 50px; font-weight: 600; line-height: 0.9; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .clk .sec { font-size: 22px; color: var(--color-turq-400); }
  .dt { font-size: 16px; color: var(--color-mist); text-transform: capitalize; margin-top: 4px; }
  .title { margin-top: 22px; font-size: 32px; font-weight: 600; line-height: 1.04; color: var(--color-turq-400); letter-spacing: -0.01em; }
  .clubs-head { display: flex; align-items: baseline; justify-content: space-between; margin: 20px 0 12px; }
  .clubs-head h2 { font-size: 22px; font-weight: 600; }
  .clubs-head .n { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-stone); white-space: nowrap; }
  .club-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ctile { position: relative; padding: 12px 13px 11px; border-radius: var(--radius-lg); overflow: hidden;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
  .ctile .glow { position: absolute; top: 0; right: 0; bottom: 0; left: 0; opacity: 0.16; }
  .ctile .cat { position: relative; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .ctile .nm { position: relative; font-size: 17px; font-weight: 600; line-height: 1.08; margin-top: 5px; }
  .ctile .rw { position: relative; display: flex; align-items: baseline; justify-content: space-between; margin-top: 8px; }
  .ctile .dy { font-size: 12px; color: var(--color-mist); }
  .ctile .tm { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* tides + sea */
  .tides { margin-top: auto; padding-top: 16px; }
  .tides .h { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--color-mist); margin-bottom: 8px; }
  .tides .pill { font-size: 11px; font-weight: 600; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--color-turq-300); background: rgba(0,169,168,0.14); padding: 3px 10px; border-radius: 999px; border: 1px solid rgba(0,169,168,0.3); }
  .tstrip { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
  .tc { padding: 7px 9px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.04); }
  .tc.next { background: rgba(0,169,168,0.12); border: 1px solid rgba(0,169,168,0.3); }
  .tc .k { font-size: 11px; color: var(--color-stone); } .tc.next .k { color: var(--color-turq-300); }
  .tc .v { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; } .tc .v span { font-size: 10px; font-weight: 400; color: var(--color-stone); }
  .tc .x { font-size: 10.5px; color: var(--color-slate); }
  .sea { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; margin-top: 8px; }
  .sea .m { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.04); }
  .sea .m .ic { width: 22px; height: 22px; flex: none; color: var(--color-mist); opacity: 0.9; }
  .sea .m .ic svg { width: 100%; height: 100%; display: block; }
  .sea .m .bd3 { flex: 1; min-width: 0; }
  .sea .m .lb { font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-stone); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sea .m .vl { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.15; }
  /* chip de Actividades marinas — veredicto con color */
  .sea .m.act .vl { font-variant-numeric: normal; }
  .sea .m.snk-good .vl { color: var(--color-turq-400); }
  .sea .m.snk-mid  .vl { color: #e6b652; }
  .sea .m.snk-bad  .vl { color: var(--color-coral); }
  /* semáforo por elemento: verde=bueno, ámbar=regular, rojo=malo */
  .sem { width: 11px; height: 11px; border-radius: 999px; flex: none; }
  .sem.ok  { background: #34c759; box-shadow: 0 0 7px rgba(52,199,89,0.65); }
  .sem.mid { background: #e6b652; box-shadow: 0 0 7px rgba(230,182,82,0.65); }
  .sem.bad { background: #e0584a; box-shadow: 0 0 7px rgba(224,88,74,0.65); }
  .station { font-size: 11px; color: var(--color-slate); margin-top: 8px; }

  /* ===== RIGHT (bento) ===== */
  #main { position: relative; padding: 40px 44px 38px; display: flex; flex-direction: column; min-width: 0; }
  .mh { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .mh .eb { font-size: 14px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--color-turq-300); }
  .mh h1 { font-size: 34px; font-weight: 600; letter-spacing: -0.01em; }
  .mh .wk { font-size: 17px; color: var(--color-stone); }

  /* Pinned bento (rotates) */
  .pin-wrap { position: relative; height: 392px; flex: none; margin-bottom: 22px; }
  .pin { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: grid; grid-template-columns: 392px 1fr; gap: 0; border-radius: var(--radius-2xl); overflow: hidden;
    border: 1px solid rgba(255,255,255,0.09); box-shadow: var(--shadow-xl); opacity: 0; transition: opacity 800ms var(--ease-out-quart); }
  .pin.on { opacity: 1; }
  .pin .art { position: relative; overflow: hidden; background: #0a1f2e; }
  .pin .art img.cover { width: 100%; height: 100%; object-fit: cover; }
  .pin .art img.flyer { width: 100%; height: 100%; object-fit: cover; }
  .pin .art .frame { position: absolute; top: 0; right: 0; bottom: 0; left: 0; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
  .pin .info { position: relative; padding: 34px 36px; display: flex; flex-direction: column; justify-content: center;
    background: linear-gradient(150deg, #103a52, #0a2231); }
  .pin .info .accent { position: absolute; left: 0; top: 34px; bottom: 34px; width: 5px; border-radius: 999px; }
  .pin .star { position: absolute; top: 24px; right: 28px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--color-turq-300); }
  .pin .kick { font-size: 15px; font-weight: 600; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--color-turq-300); margin-bottom: 12px; }
  .pin .tt { font-size: 48px; font-weight: 600; line-height: 0.98; letter-spacing: -0.015em; }
  .pin .sub { font-size: 22px; color: var(--color-mist); margin-top: 13px; line-height: 1.3; max-width: 94%; text-wrap: pretty; }
  .pin .when { display: flex; align-items: center; gap: 20px; margin-top: 24px; }
  .pin .db { display: flex; align-items: baseline; gap: 9px; }
  .pin .db .d { font-size: 58px; font-weight: 600; line-height: 0.85; letter-spacing: -0.02em; }
  .pin .db .my { font-size: 17px; font-weight: 600; color: var(--color-mist); line-height: 1.05; }
  .pin .wm { border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px; }
  .pin .wm .t { font-size: 26px; font-weight: 600; } .pin .wm .p { font-size: 17px; color: var(--color-mist); }
  .pin .partners { font-size: 14px; color: var(--color-stone); margin-top: 18px; }
  /* convenio / promo variant */
  .pin .ribbon { position: absolute; top: 22px; left: 22px; z-index: 3; display: flex; align-items: center; gap: 9px;
    font-size: 13px; font-weight: 600; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: #fff;
    background: rgba(4,16,26,0.55); padding: 8px 15px; border-radius: 999px; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.22); }
  .pin .ribbon b { width: 9px; height: 9px; border-radius: 999px; display: inline-block; }
  .pin .info.conv { background: linear-gradient(150deg, #123243, #0b2330); }
  .pin .db.disc .d { line-height: 0.9; }
  .pin .db.disc .my { white-space: pre-line; }
  .pin .pct { display: inline-flex; align-items: baseline; gap: 10px; padding: 8px 18px 10px; border-radius: var(--radius-lg); border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.05); }

  /* event tiles grid (paginated) */
  .grid-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; }
  .grid-head h2 { font-size: 22px; font-weight: 600; }
  .grid-head .hint { font-size: 14px; color: var(--color-slate); margin-left: auto; }
  .grid-vp { position: relative; flex: 1; min-height: 0; }
  /* lista de próximos eventos: 2 columnas, miniatura + texto */
  .lpage { position: absolute; top: 0; right: 0; bottom: 0; left: 0; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: min-content; align-content: start; gap: 11px 18px; opacity: 0; transition: opacity 700ms var(--ease-out-quart); }
  .lpage.on { opacity: 1; }
  .erow { display: flex; gap: 13px; align-items: center; padding: 13px 16px; border-radius: var(--radius-md); background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.07); overflow: hidden; }
  .erow .bd2 { min-width: 0; flex: 1; }
  .erow .tm2 { font-size: 13px; font-weight: 600; color: var(--color-turq-300); font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .erow .tt2 { font-size: 18px; font-weight: 600; line-height: 1.12; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .erow .pl2 { font-size: 13px; color: var(--color-stone); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .erow.imp { border-color: rgba(0,169,168,0.4); }
  .empty { position:absolute; top:0; right:0; bottom:0; left:0; display:grid; place-items:center; color:var(--color-stone); font-size:20px; }
  .dots { position: absolute; bottom: -2px; right: 0; display: flex; gap: 7px; }
  .dots .d { width: 8px; height: 8px; border-radius: 999px; background: rgba(255,255,255,0.2); transition: all var(--dur-base); }
  .dots .d.on { background: var(--color-turq-400); width: 24px; }

  #kiosk h1, #kiosk h2, #kiosk h3, #kiosk h4 { color: var(--color-paper); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div id="stage">
  <main id="kiosk" data-screen-label="Kiosko · Mosaico">
    <aside id="rail">
      <div class="top">
        <img class="logo" src="assets/logo-white.png" alt="USFQ Galápagos" />
        <div class="clk-wrap"><div class="clk" id="clk">--:--</div><div class="dt" id="date">—</div></div>
      </div>
      <div class="title">¿Qué pasa<br>en la USFQ?</div>
      <div class="clubs-head"><h2>Clubes activos</h2><span class="n" id="club-n">—</span></div>
      <div class="club-grid" id="clubs"></div>
      <div class="tides">
        <div class="h">Mareas hoy <span class="pill" id="tstate">—</span></div>
        <div class="tstrip" id="tides"></div>
        <div class="h" style="margin-top:14px">Estado del mar <span class="pill" id="seastate">—</span></div>
        <div class="sea" id="sea"></div>
        <div class="station" id="station"></div>
      </div>
    </aside>

    <section id="main">
      <div class="mh">
        <div><div class="eb">Cartelera estudiantil</div><h1>Cartelera de eventos</h1></div>
        <div class="wk" id="wk"></div>
      </div>
      <div class="pin-wrap" id="pin-wrap"></div>
      <div class="grid-head"><h2>Próximos eventos</h2><span class="hint" id="hint"></span></div>
      <div class="grid-vp" id="grid"><div class="dots" id="dots"></div></div>
    </section>
  </main>
</div>

<script src="data.js"></script>
<script>
(function () {
  const TZ = 'America/Costa_Rica';   // Galápagos (UTC-6, sin DST)
  const REFRESH_MS = 120000;         // re-leer el feed cada 2 min
  let timers = [];                   // intervalos de rotación a limpiar entre renders

  // Ajuste a CUALQUIER pantalla, SIN transform (los WebKit viejos de TVs LG no
  // componen bien `transform: scale` sobre el lienzo y dejaban la pantalla en negro).
  // Camino principal: CSS `zoom` — soportado por todos los navegadores de TV (es el
  // mecanismo estándar del digital signage) y hoy estandarizado. zoom = ancho/1920
  // llena el ancho exacto anclado en (0,0); la altura no se estira con distorsión:
  // se ajusta la altura REAL del lienzo a alto/zoom px y el layout flex/grid absorbe
  // la diferencia. Fallback a transform solo si `zoom` no existe (p. ej. Firefox viejo).
  // try/catch para que un fallo de medición jamás frene el resto del script.
  var OVERFILL = 1.002;
  function fit(){
    try {
      var de = document.documentElement;
      var vw = de.clientWidth  || window.innerWidth  || 0;
      var vh = de.clientHeight || window.innerHeight || 0;
      var k  = document.getElementById('kiosk');
      if(!k || !vw || !vh) return;
      if('zoom' in k.style){
        var z = (vw / 1920) * OVERFILL;
        k.style.transform = ''; k.style.webkitTransform = '';
        k.style.zoom = z;
        k.style.height = Math.ceil(vh / z) + 'px';
      } else {
        k.style.zoom = '';
        k.style.height = '1080px';
        var t = 'scale(' + ((vw / 1920) * OVERFILL) + ',' + ((vh / 1080) * OVERFILL) + ')';
        k.style.webkitTransform = t; k.style.transform = t;
      }
    } catch(e){ /* no romper el render por un problema de viewport */ }
  }
  ['resize','orientationchange','load','pageshow'].forEach(ev => addEventListener(ev, fit));
  if (window.visualViewport) visualViewport.addEventListener('resize', fit);
  if (window.ResizeObserver) new ResizeObserver(fit).observe(document.documentElement);
  fit();
  requestAnimationFrame(fit);
  [150, 600, 1500].forEach(t => setTimeout(fit, t));   // recalcula tras barras/fuentes/zoom

  // ---- Reloj (hora de Galápagos) -----------------------------------------
  const MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const DIA=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  function tick(){
    const p = new Intl.DateTimeFormat('es-EC',{ timeZone:TZ, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, weekday:'long', day:'numeric', month:'long' }).formatToParts(new Date());
    const g = t => (p.find(x=>x.type===t)||{}).value || '';
    document.getElementById('clk').innerHTML=`${g('hour')}:${g('minute')}<span class="sec">${g('second')}</span>`;
    const wd=g('weekday'); document.getElementById('date').textContent=`${wd.charAt(0).toUpperCase()+wd.slice(1)}, ${g('day')} de ${g('month')}`;
  }
  tick(); setInterval(tick,1000);

  function clearTimers(){ timers.forEach(t=>clearInterval(t)); timers=[]; }

  // ---- Render principal ---------------------------------------------------
  function render(K){
    clearTimers();

    // Clubes
    document.getElementById('club-n').textContent = 'Abierto a toda la comunidad';
    document.getElementById('clubs').innerHTML = K.clubs.map(c=>{ const cat=K.CATS[c.cat]||K.CATS.letras;
      return `<div class="ctile">
        <span class="glow" style="background:radial-gradient(120% 120% at 0% 0%, ${cat.color}, transparent 70%)"></span>
        <div class="cat" style="color:${cat.color}">${cat.label}</div>
        <div class="nm">${c.name}</div>
        <div class="rw"><span class="dy">${c.days||''}</span><span class="tm">${c.time||''}</span></div>
      </div>`; }).join('');

    // Mareas
    document.getElementById('tstate').textContent = K.tides.state || '—';
    document.getElementById('station').textContent = K.tides.station || '';
    document.getElementById('tides').innerHTML = (K.tides.points||[]).map(p=>`<div class="tc ${p.next?'next':''}">
      <div class="k">${p.kind}</div><div class="v">${p.h}<span> m</span></div><div class="x">${p.time} h</div></div>`).join('')
      || `<div class="tc"><div class="k">Sin datos</div><div class="v">—</div></div>`;
    // Estado del mar (con veredicto de snorkel en lugar del sol)
    renderSea(K.marine);

    // Cabecera de semana
    document.getElementById('wk').textContent = K.week.count ? `${K.week.count} eventos próximos` : '';

    renderPinned(K);
    renderList(K);
  }

  // Iconos SVG (las pantallas LG no renderizan emojis)
  const SEAICON = {
    wave: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/><path d="M2 13c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/><path d="M2 19c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/></svg>',
    temp: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V5a2 2 0 1 0-4 0v9.76a4 4 0 1 0 4 0z"/></svg>',
    wind: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h11a3 3 0 1 0-3-3"/><path d="M3 12h16a3 3 0 1 1-3 3"/><path d="M3 16h9a2.5 2.5 0 1 1-2.5 2.5"/></svg>',
    mask: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5V11a3 3 0 0 1-3 3h-1.2a2 2 0 0 1-1.8-1.1L12 10.8l-1.2 2.1A2 2 0 0 1 9 14H7.8a3 3 0 0 1-3-3z"/><path d="M20 9h2"/></svg>',
  };

  // Veredicto de actividades marinas (snorkel/baño) a partir del oleaje y viento
  function snorkelRating(m){
    const wave = m.waveHeight, wind = (m.wind && m.wind.speed != null) ? m.wind.speed : null;
    if (wave == null) return { label: '—', cls: '' };
    if (wave < 0.8 && (wind == null || wind < 25)) return { label: 'Ideal',   cls: 'snk-good' };
    if (wave < 1.5 && (wind == null || wind < 35)) return { label: 'Bueno',   cls: 'snk-good' };
    if (wave < 2.5)                                return { label: 'Regular', cls: 'snk-mid'  };
    return { label: 'Evitar', cls: 'snk-bad' };
  }

  // Semáforo por elemento: 'ok' verde · 'mid' ámbar · 'bad' rojo
  function semWave(w){ if(w==null) return 'mid'; return w<1 ? 'ok' : w<2 ? 'mid' : 'bad'; }
  function semTemp(t){ if(t==null) return 'mid'; return t>=24 ? 'ok' : t>=21 ? 'mid' : 'bad'; }
  function semWind(s){ if(s==null) return 'mid'; return s<15 ? 'ok' : s<30 ? 'mid' : 'bad'; }
  function semAct(cls){ return cls==='snk-good' ? 'ok' : cls==='snk-bad' ? 'bad' : 'mid'; }

  function renderSea(m){
    const seastate = document.getElementById('seastate'), sea = document.getElementById('sea');
    if(!m){ seastate.textContent='—'; sea.innerHTML=''; return; }
    seastate.textContent = m.seaState || '—';
    const wind  = (m.wind && m.wind.speed!=null) ? m.wind.speed : null;
    const waveV = m.waveHeight!=null ? `${m.waveHeight} m${m.swellPeriod?` · ${m.swellPeriod}s`:''}` : '—';
    const waterV= m.waterTemp!=null ? `${m.waterTemp}°C` : '—';
    const windV = (wind!=null) ? `${wind} km/h ${m.wind.dir||''}`.trim() : '—';
    const act   = snorkelRating(m);
    const chips=[
      {ic:SEAICON.wave, lb:'Oleaje',              vl:waveV,     sem:semWave(m.waveHeight), cls:''},
      {ic:SEAICON.temp, lb:'Agua',                vl:waterV,    sem:semTemp(m.waterTemp),  cls:''},
      {ic:SEAICON.wind, lb:'Viento',              vl:windV,     sem:semWind(wind),         cls:''},
      {ic:SEAICON.mask, lb:'Actividades marinas', vl:act.label, sem:semAct(act.cls),       cls:'act '+act.cls},
    ];
    sea.innerHTML = chips.map(c=>`<div class="m ${c.cls}"><span class="ic">${c.ic}</span><div class="bd3"><div class="lb">${c.lb}</div><div class="vl">${c.vl}</div></div><span class="sem ${c.sem}"></span></div>`).join('');
  }

  // ---- Destacado rotativo: eventos importantes + convenios/promos ---------
  function eventSlide(p){
    return `<div class="art"><img class="cover" src="${p.flyer||p.photo}" alt="" onerror="this.style.display='none'"/><span class="frame"></span></div>
      <div class="info">
        <span class="accent" style="background:${p.accent}"></span>
        <span class="star">★ Destacado</span>
        <div class="kick">${p.kicker||''}</div>
        <div class="tt">${p.title}</div>
        ${p.subtitle?`<div class="sub">${p.subtitle}</div>`:''}
        <div class="when">
          <div class="db"><span class="d">${p.dateNum}</span><span class="my">${p.month}<br>${p.year}</span></div>
          ${(p.time||p.place)?`<div class="wm">${p.time?`<div class="t">${p.time}</div>`:''}${p.place?`<div class="p">${p.place}</div>`:''}</div>`:''}
        </div>
        ${p.partners?`<div class="partners">${p.partners}</div>`:''}
      </div>`;
  }
  function promoSlide(c){
    return `<div class="art"><img class="cover" src="${c.photo}" alt="" onerror="this.style.display='none'"/><span class="frame"></span>
        <span class="ribbon"><b style="background:${c.accent}"></b>${c.label} · ${c.audience}</span></div>
      <div class="info conv">
        <span class="accent" style="background:${c.accent}"></span>
        <span class="star" style="color:${c.accent}">${c.category||''}</span>
        <div class="kick" style="color:${c.accent}">Beneficio para la comunidad USFQ</div>
        <div class="tt">${c.name}</div>
        ${c.tagline?`<div class="sub">${c.tagline}</div>`:''}
        <div class="when">
          <div class="pct"><span class="d" style="font-size:54px;font-weight:600;color:${c.accent};letter-spacing:-0.02em">${c.discount}</span><span class="my" style="font-size:16px;font-weight:600;color:var(--color-mist);line-height:1.05;white-space:pre-line">${c.discountNote||''}</span></div>
          ${c.place?`<div class="wm"><div class="p" style="font-size:18px">${c.place}</div></div>`:''}
        </div>
        ${c.terms?`<div class="partners">${c.terms}</div>`:''}
      </div>`;
  }

  function renderPinned(K){
    const pw=document.getElementById('pin-wrap'); pw.innerHTML='';
    const ev=(K.pinned||[]).map(p=>({t:'e',d:p})), pr=(K.promos||[]).map(p=>({t:'p',d:p}));
    const spot=[]; for(let i=0;i<Math.max(ev.length,pr.length);i++){ if(ev[i])spot.push(ev[i]); if(pr[i])spot.push(pr[i]); }
    if(spot.length===0){ pw.style.display='none'; return; }
    pw.style.display='';
    spot.forEach((s,i)=>{ const el=document.createElement('article'); el.className='pin'+(i===0?' on':'');
      el.innerHTML = s.t==='e' ? eventSlide(s.d) : promoSlide(s.d); pw.appendChild(el); });
    const pins=[...pw.querySelectorAll('.pin')]; let xi=0;
    if(pins.length>1) timers.push(setInterval(()=>{ pins[xi].classList.remove('on'); xi=(xi+1)%pins.length; pins[xi].classList.add('on'); }, 8500));
  }

  // ---- Lista paginada de TODOS los próximos eventos (2 columnas) ----------
  function renderList(K){
    const grid=document.getElementById('grid');
    grid.querySelectorAll('.lpage').forEach(e=>e.remove());
    const rows=[]; (K.days||[]).forEach(d=>d.items.forEach(it=>rows.push({d,it})));
    const dots=document.getElementById('dots'), hint=document.getElementById('hint');

    if(rows.length===0){
      dots.innerHTML=''; hint.textContent='';
      let e=grid.querySelector('.empty'); if(!e){ e=document.createElement('div'); e.className='empty'; grid.appendChild(e); }
      e.textContent='No hay eventos próximos';
      return;
    }
    const ex=grid.querySelector('.empty'); if(ex) ex.remove();

    const per=10, pages=Math.ceil(rows.length/per);   // 2 columnas × 5 filas
    for(let pg=0; pg<pages; pg++){ const page=document.createElement('div'); page.className='lpage'+(pg===0?' on':'');
      page.innerHTML=rows.slice(pg*per,pg*per+per).map(({d,it})=>{
        const imp=it.type==='importante'; const cat=imp?null:(K.CATS[it.cat]||K.CATS.letras);
        const accent=imp?'var(--color-turq-400)':cat.color;
        const time=it.start?K.fmtTime(it.start):'';
        return `<div class="erow ${imp?'imp':''}" style="border-left:4px solid ${accent}">
          <div class="bd2">
            <div class="tm2">${time?time+' · ':''}${d.dow} ${d.date}</div>
            <div class="tt2">${imp?'★ ':''}${it.title}</div>
            ${it.place?`<div class="pl2">${it.place}</div>`:''}
          </div></div>`;}).join('');
      grid.appendChild(page); }

    dots.innerHTML=Array.from({length:pages},(_,i)=>`<span class="d ${i===0?'on':''}"></span>`).join('');
    const pageEls=[...grid.querySelectorAll('.lpage')], dotEls=[...dots.querySelectorAll('.d')]; let gi=0;
    hint.textContent=`Página 1 de ${pages}`;
    if(pages>1) timers.push(setInterval(()=>{ pageEls[gi].classList.remove('on'); dotEls[gi].classList.remove('on');
      gi=(gi+1)%pages; pageEls[gi].classList.add('on'); dotEls[gi].classList.add('on');
      hint.textContent=`Página ${gi+1} de ${pages}`; }, 9000));
  }

  // ---- Carga + refresco ---------------------------------------------------
  async function load(){ const K=await window.loadKioskData(); render(K); }
  load();
  setInterval(load, REFRESH_MS);
})();
</script>
</body>
</html>
