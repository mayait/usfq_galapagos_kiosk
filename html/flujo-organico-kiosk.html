<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080,initial-scale=1">
<title>USFQ Galapagos — Kiosk v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font-sans: 'Inter', sans-serif;
    --font-serif: 'DM Serif Display', serif;
    --glass-bg: rgba(10, 15, 30, 0.45);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-blur: blur(40px);
    --glass-bg-light: rgba(255, 255, 255, 0.06);
    --glass-border-light: rgba(255, 255, 255, 0.12);
    --text-primary: #FFFFFF;
    --text-secondary: rgba(255, 255, 255, 0.7);
    --text-muted: rgba(255, 255, 255, 0.4);
    --accent: #00D4AA;
    --accent-glow: rgba(0, 212, 170, 0.3);
    --warning: #FFB347;
    --danger: #FF6B6B;
    --blue: #5B9CF6;
    --purple: #B07CFF;
    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 14px;
    --radius-pill: 9999px;
  }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: var(--font-sans);
    color: var(--text-primary);
  }

  /* ===== FULLSCREEN BACKGROUND SLIDESHOW ===== */
  .bg-slideshow {
    position: fixed; inset: 0; z-index: 0;
  }
  .bg-slide {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
    transform: scale(1.05);
    animation: kenBurns 25s ease-in-out infinite alternate;
  }
  .bg-slide.active {
    opacity: 1;
  }
  @keyframes kenBurns {
    0% { transform: scale(1.0); }
    100% { transform: scale(1.08); }
  }

  /* Dark overlay for readability */
  .bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(
      135deg,
      rgba(0, 0, 0, 0.65) 0%,
      rgba(0, 10, 20, 0.50) 40%,
      rgba(0, 5, 15, 0.55) 70%,
      rgba(0, 0, 0, 0.70) 100%
    );
  }

  /* Noise texture overlay */
  .bg-noise {
    position: fixed; inset: 0; z-index: 2;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* ===== MAIN LAYOUT ===== */
  .kiosk {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 480px 1fr;
    grid-template-rows: 1fr;
    gap: 0;
  }

  /* ===== LEFT PANEL ===== */
  .left-panel {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 40px;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border-right: 1px solid var(--glass-border);
  }

  /* Top: Brand + Clock */
  .brand-section {
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-logo .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 20px var(--accent-glow);
  }
  .brand-logo .logo-text {
    display: flex;
    flex-direction: column;
  }
  .brand-logo .logo-text h1 {
    font-family: var(--font-sans);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .brand-logo .logo-text .campus-tag {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .clock-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .clock-time {
    font-family: var(--font-sans);
    font-weight: 900;
    font-size: 96px;
    line-height: 1;
    letter-spacing: -6px;
    background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.5) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .clock-date {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 22px;
    color: var(--text-secondary);
    padding-left: 4px;
  }

  /* Middle: Sea conditions */
  .sea-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--glass-border-light);
  }

  .sea-status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .sea-status-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: var(--radius-pill);
    animation: badgePulse 3s ease-in-out infinite;
  }
  .sea-status-badge.optimal {
    color: var(--accent);
    background: rgba(0, 212, 170, 0.1);
    border: 1px solid rgba(0, 212, 170, 0.2);
  }
  .sea-status-badge.moderate {
    color: var(--warning);
    background: rgba(255, 179, 71, 0.1);
    border: 1px solid rgba(255, 179, 71, 0.2);
  }
  .sea-status-badge.rough {
    color: var(--danger);
    background: rgba(255, 107, 107, 0.1);
    border: 1px solid rgba(255, 107, 107, 0.2);
  }
  @keyframes badgePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .sea-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .sea-card {
    background: var(--glass-bg-light);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .sea-card:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--glass-border-light);
    transform: translateY(-2px);
  }
  .sea-card .sc-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .sea-card .sc-value {
    font-weight: 700;
    font-size: 26px;
    line-height: 1;
    color: var(--text-primary);
  }
  .sea-card .sc-unit {
    font-weight: 400;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .sea-card.highlight .sc-value {
    color: var(--accent);
  }

  .snorkel-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--glass-bg-light);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .snorkel-bar strong { color: var(--text-primary); font-weight: 600; }

  .sea-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .mini-spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Bottom: Week summary */
  .week-summary {
    font-size: 13px;
    color: var(--text-muted);
    border-top: 1px solid var(--glass-border);
    padding-top: 16px;
  }

  /* ===== RIGHT PANEL ===== */
  .right-panel {
    position: relative;
    overflow: hidden;
  }

  /* Gradient masks */
  .right-panel::before,
  .right-panel::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 100px;
    z-index: 20;
    pointer-events: none;
  }
  .right-panel::before {
    top: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
  }
  .right-panel::after {
    bottom: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 100%);
  }

  .right-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 25;
    padding: 40px 56px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .right-header h2 {
    font-family: var(--font-serif);
    font-size: 36px;
    font-weight: 400;
    color: var(--text-primary);
  }
  .right-header .event-count {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: rgba(0, 212, 170, 0.1);
    border: 1px solid rgba(0, 212, 170, 0.15);
    border-radius: var(--radius-pill);
    padding: 6px 16px;
    backdrop-filter: blur(10px);
  }

  .scroll-container {
    height: 100%;
    overflow-y: auto;
    padding: 110px 56px 100px 56px;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  /* Day sections */
  .day-section {
    margin-bottom: 40px;
    animation: sectionFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes sectionFadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 18px;
    padding-left: 2px;
  }
  .day-name {
    font-family: var(--font-serif);
    font-size: 28px;
    color: var(--text-primary);
  }
  .day-name.is-today {
    color: var(--accent);
  }
  .day-date {
    font-size: 15px;
    font-weight: 300;
    color: var(--text-muted);
  }
  .day-count-badge {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--glass-bg-light);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-pill);
    padding: 3px 12px;
    backdrop-filter: blur(8px);
  }

  /* Event cards — full glass */
  .event-card {
    background: var(--glass-bg-light);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 24px 28px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    cursor: default;
    animation: cardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .event-card:hover {
    background: rgba(255, 255, 255, 0.09);
    border-color: var(--glass-border-light);
    transform: translateY(-3px) scale(1.005);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }
  @keyframes cardSlideIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Color accent line */
  .event-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 3px 3px 0;
  }
  .event-card.cat-academico::before { background: var(--blue); }
  .event-card.cat-club::before { background: var(--accent); }
  .event-card.cat-deporte::before { background: var(--warning); }
  .event-card.cat-social::before { background: var(--purple); }
  .event-card.cat-bienestar::before { background: #34D399; }
  .event-card.cat-evento::before { background: var(--text-muted); }

  .ev-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ev-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-academico .ev-dot { background: var(--blue); box-shadow: 0 0 10px rgba(91,156,246,0.5); }
  .cat-club .ev-dot { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .cat-deporte .ev-dot { background: var(--warning); box-shadow: 0 0 10px rgba(255,179,71,0.5); }
  .cat-social .ev-dot { background: var(--purple); box-shadow: 0 0 10px rgba(176,124,255,0.5); }
  .cat-bienestar .ev-dot { background: #34D399; box-shadow: 0 0 10px rgba(52,211,153,0.5); }
  .cat-evento .ev-dot { background: var(--text-muted); }

  .ev-time {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .cat-academico .ev-time { color: var(--blue); }
  .cat-club .ev-time { color: var(--accent); }
  .cat-deporte .ev-time { color: var(--warning); }
  .cat-social .ev-time { color: var(--purple); }
  .cat-bienestar .ev-time { color: #34D399; }
  .cat-evento .ev-time { color: var(--text-muted); }

  .ev-title {
    font-family: var(--font-serif);
    font-size: 24px;
    line-height: 1.2;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .ev-location {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-secondary);
  }
  .ev-location svg { opacity: 0.5; flex-shrink: 0; }

  /* NOW badge */
  .event-card.is-now {
    border-color: rgba(0, 212, 170, 0.25);
    box-shadow: 0 0 40px rgba(0, 212, 170, 0.08);
  }
  .event-card.is-now::after {
    content: 'EN VIVO';
    position: absolute;
    top: 14px; right: 18px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    background: rgba(0, 212, 170, 0.1);
    border: 1px solid rgba(0, 212, 170, 0.2);
    border-radius: var(--radius-pill);
    padding: 4px 14px;
    animation: livePulse 2s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,212,170,0.3); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,212,170,0); }
  }

  /* Empty & Loading */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 60vh; text-align: center;
  }
  .empty-state h2 {
    font-family: var(--font-serif); font-style: italic;
    font-size: 30px; color: var(--text-secondary);
  }
  .empty-state p {
    font-size: 15px; color: var(--text-muted); margin-top: 10px;
  }

  .loading-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 60vh; gap: 20px;
  }
  .loading-ring {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,0.06);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 15px; color: var(--text-muted); }

  /* Status toast */
  .status-toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border-light);
    border-radius: var(--radius-pill);
    padding: 10px 28px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    z-index: 200;
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .status-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Photo credit */
  .photo-credit {
    position: fixed;
    bottom: 12px; right: 20px;
    z-index: 15;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    font-weight: 400;
  }

  /* Stagger delays */
  .event-card:nth-child(1) { animation-delay: 0.0s; }
  .event-card:nth-child(2) { animation-delay: 0.08s; }
  .event-card:nth-child(3) { animation-delay: 0.16s; }
  .event-card:nth-child(4) { animation-delay: 0.24s; }
  .event-card:nth-child(5) { animation-delay: 0.32s; }
  .event-card:nth-child(6) { animation-delay: 0.40s; }
  .event-card:nth-child(7) { animation-delay: 0.48s; }
  .event-card:nth-child(8) { animation-delay: 0.56s; }

  .day-section:nth-child(1) { animation-delay: 0s; }
  .day-section:nth-child(2) { animation-delay: 0.15s; }
  .day-section:nth-child(3) { animation-delay: 0.3s; }
  .day-section:nth-child(4) { animation-delay: 0.45s; }
  .day-section:nth-child(5) { animation-delay: 0.6s; }
</style>
</head>
<body>

<!-- ===== BACKGROUND SLIDESHOW ===== -->
<div class="bg-slideshow" id="bgSlideshow"></div>
<div class="bg-overlay"></div>
<div class="bg-noise"></div>

<div class="status-toast" id="statusToast"></div>

<!-- ===== MAIN KIOSK ===== -->
<div class="kiosk">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="brand-section">
      <div class="brand-logo">
        <div class="logo-icon">
          <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
            <path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4"/>
            <path d="M12 16v-4"/>
            <circle cx="12" cy="8" r="1"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>USFQ Galapagos</h1>
          <span class="campus-tag">San Cristobal</span>
        </div>
      </div>

      <div class="clock-section">
        <div class="clock-time" id="clock">--:--</div>
        <div class="clock-date" id="dateText">cargando...</div>
      </div>
    </div>

    <div class="sea-section">
      <div class="section-label">Estado del Mar</div>
      <div class="sea-status-row">
        <span class="sea-status-badge" id="seaBadge" style="display:none;">--</span>
      </div>
      <div id="seaContent">
        <div class="sea-loading">
          <div class="mini-spinner"></div>
          Consultando condiciones...
        </div>
      </div>
    </div>

    <div class="week-summary" id="weekLabel"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="right-header">
      <h2>Esta Semana</h2>
      <span class="event-count" id="eventCountBadge"></span>
    </div>
    <div class="scroll-container" id="scrollContainer">
      <div id="eventList">
        <div class="loading-state" id="loadingState">
          <div class="loading-ring"></div>
          <p>Conectando con el calendario...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="photo-credit" id="photoCredit"></div>

<script>
// ===== CONFIG =====
const ICS_URL = 'https://outlook.office365.com/owa/calendar/71a3663561a843bca1cccea1dffd9fa6@usfq.edu.ec/7755590ea9af4dcb84b49fb91d1b2a0f13028026135859137563/calendar.ics';
const CORS_PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => url
];
const REFRESH_INTERVAL = 600000;
const AUTO_SCROLL_SPEED = 0.4;
const AUTO_SCROLL_PAUSE = 8000;
const GALAPAGOS_TZ = 'America/Guayaquil';

const STORMGLASS_KEY = '34cdf64c-90e7-11f0-b07a-0242ac130006-34cdf700-90e7-11f0-b07a-0242ac130006';
const STORMGLASS_LAT = -0.9024;
const STORMGLASS_LNG = -89.6105;

// Galapagos photos from Unsplash (direct links)
const BG_PHOTOS = [
  { url: 'https://images.unsplash.com/photo-1544979590-37e9b47eb705?w=1920&q=85&auto=format', credit: 'Galapagos Tortoise' },
  { url: 'https://images.unsplash.com/photo-1559599238-308793637427?w=1920&q=85&auto=format', credit: 'Blue-footed Booby' },

// ===== ICS PARSER =====
function parseICS(text) {
  const vevents = [];
  const blocks = text.split('BEGIN:VEVENT');
  blocks.shift();

  for (const block of blocks) {
    const raw = block.split('END:VEVENT')[0];
    const unfolded = raw.replace(/\r?\n[ \t]/g, '');
    const lines = unfolded.split(/\r?\n/);
    const ev = {};

    for (const line of lines) {
      const ci = line.indexOf(':');
      if (ci < 0) continue;
      const keyPart = line.substring(0, ci);
      const value = line.substring(ci + 1);
      const key = keyPart.split(';')[0].trim();

      if (key === 'SUMMARY') ev.summary = value.replace(/\\n/g, ' ').replace(/\\,/g, ',').trim();
      if (key === 'DTSTART') ev.dtstart = parseICSDate(value, keyPart);
      if (key === 'DTEND') ev.dtend = parseICSDate(value, keyPart);
      if (key === 'LOCATION') ev.location = value.replace(/\\n/g, ' ').replace(/\\,/g, ',').trim();
      if (key === 'DESCRIPTION') ev.description = value.replace(/\\n/g, '\n').replace(/\\,/g, ',').trim();
      if (key === 'RRULE') ev.rrule = value;
    }
    if (ev.summary && ev.dtstart) vevents.push(ev);
  }
  return expandAndSort(vevents);
}

function parseICSDate(value, keyPart) {
  const isDate = keyPart.includes('VALUE=DATE') || (value.length === 8 && !value.includes('T'));
  const clean = value.replace('Z', '');
  if (isDate) return new Date(clean.slice(0,4)+'-'+clean.slice(4,6)+'-'+clean.slice(6,8)+'T00:00:00');
  const y=clean.slice(0,4), mo=clean.slice(4,6), d=clean.slice(6,8);
  const h=clean.slice(9,11), mi=clean.slice(11,13), s=clean.slice(13,15)||'00';
  if (value.endsWith('Z')) return new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}Z`);
  return new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}-05:00`);
}

function getWeekBounds() {
  const now = new Date();
  const day = now.getDay();
  const diffToMon = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diffToMon);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { monday, sunday };
}

function expandAndSort(vevents) {
  const { monday, sunday } = getWeekBounds();
  let expanded = [];
  for (const ev of vevents) {
    if (ev.rrule) {
      expanded.push(...expandRRule(ev, monday, sunday));
    } else if (ev.dtstart >= monday && ev.dtstart <= sunday) {
      expanded.push({ ...ev });
    }
  }
  const seen = new Set();
  expanded = expanded.filter(ev => {
    const key = ev.summary + '|' + ev.dtstart.toISOString().slice(0,16);
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
  return expanded.sort((a, b) => a.dtstart - b.dtstart);
}

function expandRRule(ev, from, to) {
  const rule = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); rule[k] = v; });
  const instances = [];
  const freq = rule.FREQ;
  const until = rule.UNTIL ? parseICSDate(rule.UNTIL, '') : to;
  const count = rule.COUNT ? parseInt(rule.COUNT) : 200;
  const interval = rule.INTERVAL ? parseInt(rule.INTERVAL) : 1;
  const byDay = rule.BYDAY ? rule.BYDAY.split(',') : null;
  const dayMap = { SU:0, MO:1, TU:2, WE:3, TH:4, FR:5, SA:6 };
  let cursor = new Date(ev.dtstart);
  let gen = 0;
  const dur = ev.dtend ? (ev.dtend - ev.dtstart) : 3600000;
  while (cursor <= until && cursor <= to && gen < count) {
    if (cursor >= from) {
      let inc = true;
      if (byDay) inc = byDay.some(d => dayMap[d] === cursor.getDay());
      if (inc) {
        instances.push({ ...ev, dtstart: new Date(cursor), dtend: new Date(cursor.getTime()+dur), rrule: undefined });
        gen++;
      }
    }
    if (freq === 'DAILY') cursor.setDate(cursor.getDate() + 1);
    else if (freq === 'WEEKLY') {
      cursor.setDate(cursor.getDate() + (byDay && byDay.length > 1 ? 1 : 7 * interval));
    } else if (freq === 'MONTHLY') cursor.setMonth(cursor.getMonth() + interval);
    else cursor.setDate(cursor.getDate() + 1);
  }
  return instances;
}

// ===== FETCH =====
async function fetchCalendar() {
  showStatus('Actualizando...');
  for (const proxy of CORS_PROXIES) {
    try {
      const resp = await fetch(proxy(ICS_URL), { cache: 'no-cache' });
      if (!resp.ok) continue;
      const text = await resp.text();
      if (!text.includes('BEGIN:VCALENDAR')) continue;
      const parsed = parseICS(text);
      if (parsed.length > 0) {
        events = parsed;
        showStatus(`${events.length} eventos esta semana`);
        setTimeout(hideStatus, 3000);
        return true;
      }
    } catch(e) { continue; }
  }
  showStatus('Usando datos de respaldo');
  setTimeout(hideStatus, 3000);
  useFallbackData();
  return false;
}

function useFallbackData() {
  const nxt = (dow, h, m) => {
    const now = new Date(), d = new Date(now);
    const diff = (dow - d.getDay() + 7) % 7;
    d.setDate(d.getDate() + (diff === 0 && d.getHours() >= h ? 7 : diff));
    d.setHours(h, m, 0, 0); return d;
  };
  events = [
    { summary: 'Club de Jiu-Jitsu', dtstart: nxt(1,7,0), dtend: nxt(1,8,0), location: 'Tatamis' },
    { summary: 'Coloquio: ADN para la Conservacion', dtstart: nxt(2,17,30), dtend: nxt(2,19,0), location: 'Salon de la Comunidad' },
    { summary: 'Club de Yoga', dtstart: nxt(3,18,0), dtend: nxt(3,19,30), location: 'Terraza USFQ' },
    { summary: 'Basket Interinstitucional', dtstart: nxt(3,14,0), dtend: nxt(3,16,0), location: 'Gualacata' },
    { summary: 'TardeDePelis', dtstart: nxt(4,17,30), dtend: nxt(4,19,30), location: 'Salon de la Comunidad' },
    { summary: 'Club Alfa Training', dtstart: nxt(5,12,30), dtend: nxt(5,13,30), location: 'Banderas - Loberia - Playa Mann' },
    { summary: 'Club Creative Lab', dtstart: nxt(5,16,0), dtend: nxt(5,18,0), location: 'Pergola' },
    { summary: 'Club de Peloteo', dtstart: nxt(0,15,30), dtend: nxt(0,17,0), location: 'Cancha Divino Nino' },
  ].sort((a,b) => a.dtstart - b.dtstart);
}

// ===== RENDER =====
function renderEvents() {
  const list = document.getElementById('eventList');
  list.innerHTML = '';

  if (events.length === 0) {
    list.innerHTML = `<div class="empty-state"><h2>Sin eventos esta semana</h2><p>El calendario se actualiza automaticamente</p></div>`;
    document.getElementById('eventCountBadge').textContent = '';
    return;
  }

  document.getElementById('eventCountBadge').textContent = `${events.length} evento${events.length !== 1 ? 's' : ''}`;

  const groups = new Map();
  const now = new Date();
  events.forEach(ev => {
    const key = ev.dtstart.toDateString();
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(ev);
  });

  let cardIndex = 0;
  groups.forEach((dayEvents, dateKey) => {
    const section = document.createElement('div');
    section.className = 'day-section';

    const d = dayEvents[0].dtstart;
    const dayLabel = getRelativeDay(d);
    const isToday = isSameDay(d, now);
    const dateStr = d.toLocaleDateString('es-EC', { day: 'numeric', month: 'long', timeZone: GALAPAGOS_TZ });

    section.innerHTML = `
      <div class="day-header">
        <span class="day-name ${isToday ? 'is-today' : ''}">${dayLabel}</span>
        <span class="day-date">${dateStr}</span>
        <span class="day-count-badge">${dayEvents.length}</span>
      </div>`;

    dayEvents.forEach(ev => {
      const catClass = 'cat-' + detectType(ev.summary);
      const isNow = isHappeningNow(ev, now);
      const card = document.createElement('div');
      card.className = `event-card ${catClass}${isNow ? ' is-now' : ''}`;
      card.style.animationDelay = (cardIndex * 0.07) + 's';

      card.innerHTML = `
        <div class="ev-meta">
          <div class="ev-dot"></div>
          <span class="ev-time">${formatTime(ev.dtstart)}${ev.dtend ? ' — ' + formatTime(ev.dtend) : ''}</span>
        </div>
        <div class="ev-title">${cleanTitle(ev.summary)}</div>
        ${ev.location ? `
        <div class="ev-location">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          ${ev.location}
        </div>` : ''}`;
      section.appendChild(card);
      cardIndex++;
    });

    list.appendChild(section);
  });

  const { monday, sunday } = getWeekBounds();
  const mFmt = monday.toLocaleDateString('es-EC', { day: 'numeric', month: 'short' });
  const sFmt = sunday.toLocaleDateString('es-EC', { day: 'numeric', month: 'short' });
  document.getElementById('weekLabel').textContent =
    `Semana del ${mFmt} al ${sFmt}`;
}

// ===== AUTO-SCROLL =====
function setupAutoScroll() {
  const container = document.getElementById('scrollContainer');
  let direction = 1;
  let scrollPaused = false;
  let pauseTimeout = null;

  container.addEventListener('wheel', onUserInteract, { passive: true });
  container.addEventListener('touchstart', onUserInteract, { passive: true });
  container.addEventListener('mousedown', onUserInteract);

  function onUserInteract() {
    userInteracted = true;
    clearTimeout(userInteractTimer);
    userInteractTimer = setTimeout(() => { userInteracted = false; }, 15000);
  }

  function scrollStep() {
    if (userInteracted) { requestAnimationFrame(scrollStep); return; }

    const maxScroll = container.scrollHeight - container.clientHeight;
    if (maxScroll <= 0) { requestAnimationFrame(scrollStep); return; }

    if (!scrollPaused) {
      container.scrollTop += AUTO_SCROLL_SPEED * direction;

      if (container.scrollTop >= maxScroll - 1) {
        scrollPaused = true;
        clearTimeout(pauseTimeout);
        pauseTimeout = setTimeout(() => { direction = -1; scrollPaused = false; }, AUTO_SCROLL_PAUSE);
      }
      if (container.scrollTop <= 1 && direction === -1) {
        scrollPaused = true;
        clearTimeout(pauseTimeout);
        pauseTimeout = setTimeout(() => { direction = 1; scrollPaused = false; }, AUTO_SCROLL_PAUSE);
      }
    }
    requestAnimationFrame(scrollStep);
  }
  requestAnimationFrame(scrollStep);
}

// ===== HELPERS =====
function formatTime(d) {
  return d.toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: GALAPAGOS_TZ }).toUpperCase();
}
function isSameDay(a, b) { return a.toDateString() === b.toDateString(); }

function getRelativeDay(d) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((target - today) / 86400000);
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Manana';
  if (diff === -1) return 'Ayer';
  const name = d.toLocaleDateString('es-EC', { weekday: 'long', timeZone: GALAPAGOS_TZ });
  return name.charAt(0).toUpperCase() + name.slice(1);
}

function isHappeningNow(ev, now) {
  return ev.dtstart <= now && ev.dtend && ev.dtend >= now;
}

function cleanTitle(s) {
  return (s || 'Evento').replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FE0F}\u{200D}\s]+/u, '').trim() || s;
}

function detectType(summary) {
  const s = summary.toLowerCase();
  if (s.includes('coloquio') || s.includes('taller') || s.includes('charla') || s.includes('seminario')) return 'academico';
  if (s.includes('club') || s.includes('training') || s.includes('creative')) return 'club';
  if (s.includes('basket') || s.includes('peloteo') || s.includes('jiu') || s.includes('alfa')) return 'deporte';
  if (s.includes('pelis') || s.includes('pizza') || s.includes('celebra') || s.includes('almuerzo')) return 'social';
  if (s.includes('mental') || s.includes('salud') || s.includes('bienestar') || s.includes('yoga')) return 'bienestar';
  return 'evento';
}

function showStatus(msg) {
  const el = document.getElementById('statusToast');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideStatus() {
  document.getElementById('statusToast').classList.remove('visible');
}

// ===== SEA CONDITIONS =====
async function fetchSeaConditions() {
  try {
    const now = Math.floor(Date.now() / 1000);
    const end = now + 7200;
    const url = `https://api.stormglass.io/v2/weather/point?lat=${STORMGLASS_LAT}&lng=${STORMGLASS_LNG}&params=waterTemperature,waveHeight,wavePeriod,windSpeed,windDirection,visibility,swellHeight,swellPeriod&start=${now}&end=${end}`;

    const resp = await fetch(url, { headers: { 'Authorization': STORMGLASS_KEY } });
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();

    if (data.hours && data.hours.length > 0) {
      renderSeaData(data.hours[0]);
    } else {
      renderSeaFallback();
    }
  } catch (e) {
    console.warn('Stormglass error:', e);
    renderSeaFallback();
  }
}

function renderSeaData(h) {
  const waterTemp = h.waterTemperature?.sg ?? h.waterTemperature?.meto ?? '—';
  const waveH = h.waveHeight?.sg ?? h.waveHeight?.ecmwf ?? '—';
  const waveP = h.wavePeriod?.sg ?? h.wavePeriod?.ecmwf ?? '—';
  const windS = h.windSpeed?.sg ?? h.windSpeed?.ecmwf ?? '—';
  const windD = h.windDirection?.sg ?? h.windDirection?.ecmwf ?? 0;

  const waveVal = typeof waveH === 'number' ? waveH : 1;
  let condClass, condLabel, snorkelText;
  if (waveVal <= 1.0) {
    condClass = 'optimal'; condLabel = 'Optimo';
    snorkelText = 'Condiciones <strong>excelentes</strong> para snorkel';
  } else if (waveVal <= 1.8) {
    condClass = 'moderate'; condLabel = 'Moderado';
    snorkelText = 'Snorkel con <strong>precaucion</strong> en zonas protegidas';
  } else {
    condClass = 'rough'; condLabel = 'Agitado';
    snorkelText = 'Snorkel <strong>no recomendado</strong> hoy';
  }

  const badge = document.getElementById('seaBadge');
  badge.textContent = condLabel;
  badge.className = 'sea-status-badge ' + condClass;
  badge.style.display = 'inline-block';

  const compass = ['N','NE','E','SE','S','SO','O','NO'];
  const windDir = compass[Math.round((typeof windD === 'number' ? windD : 0) / 45) % 8];

  document.getElementById('seaContent').innerHTML = `
    <div class="sea-grid">
      <div class="sea-card highlight">
        <span class="sc-label">Oleaje</span>
        <span class="sc-value">${typeof waveH === 'number' ? waveH.toFixed(1) : waveH} <span class="sc-unit">m</span></span>
      </div>
      <div class="sea-card">
        <span class="sc-label">Temp. agua</span>
        <span class="sc-value">${typeof waterTemp === 'number' ? waterTemp.toFixed(0) : waterTemp}<span class="sc-unit">°C</span></span>
      </div>
      <div class="sea-card">
        <span class="sc-label">Viento</span>
        <span class="sc-value">${typeof windS === 'number' ? windS.toFixed(1) : windS} <span class="sc-unit">m/s ${windDir}</span></span>
      </div>
      <div class="sea-card">
        <span class="sc-label">Periodo</span>
        <span class="sc-value">${typeof waveP === 'number' ? waveP.toFixed(0) : waveP} <span class="sc-unit">seg</span></span>
      </div>
    </div>
    <div class="snorkel-bar">
      <span style="font-size:22px;">🤿</span>
      <span>${snorkelText}</span>
    </div>`;
}

function renderSeaFallback() {
  document.getElementById('seaContent').innerHTML = `
    <div class="sea-grid">
      <div class="sea-card highlight">
        <span class="sc-label">Oleaje</span>
        <span class="sc-value">— <span class="sc-unit">m</span></span>
      </div>
      <div class="sea-card">
        <span class="sc-label">Temp. agua</span>
        <span class="sc-value">—<span class="sc-unit">°C</span></span>
      </div>
      <div class="sea-card">
        <span class="sc-label">Viento</span>
        <span class="sc-value">— <span class="sc-unit">m/s</span></span>
      </div>
      <div class="sea-card">
        <span class="sc-label">Periodo</span>
        <span class="sc-value">— <span class="sc-unit">seg</span></span>
      </div>
    </div>
    <div class="snorkel-bar">
      <span style="font-size:22px;">🤿</span>
      <span>Sin datos disponibles — se reintentara</span>
    </div>`;

  const badge = document.getElementById('seaBadge');
  badge.textContent = 'Sin datos';
  badge.className = 'sea-status-badge moderate';
  badge.style.display = 'inline-block';
}

// ===== INIT =====
async function init() {
  initSlideshow();

  const [_cal, _sea] = await Promise.allSettled([
    fetchCalendar(),
    fetchSeaConditions()
  ]);

  renderEvents();
  setupAutoScroll();

  setInterval(async () => {
    await fetchCalendar();
    renderEvents();
  }, REFRESH_INTERVAL);

  setInterval(fetchSeaConditions, 1800000);
  setInterval(() => { renderEvents(); }, 60000);
}

init();
