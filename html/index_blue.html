<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Flujo Orgánico — USFQ Galápagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --color-primary: #0F4C81;
    --color-bg: #041C32;
    --color-surface: rgba(4, 41, 58, 0.55);
    --color-text: #F1F6F9;
    --color-muted: #9BA4B5;
    --color-accent: #00B4D8;
    --color-warning: #F4A261;
    --color-green: #2DD4A0;
    --font-serif: 'Playfair Display', serif;
    --font-sans: 'Outfit', sans-serif;
    --radius-card: 24px;
    --radius-pill: 9999px;
    --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.35);
    --blur-glass: blur(16px);
  }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: var(--color-bg);
    font-family: var(--font-sans);
    color: var(--color-text);
  }

  /* ===== BACKGROUND ===== */
  .ocean-bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
    background: linear-gradient(170deg, #041C32 0%, #062a44 35%, #0a3a5c 70%, #062640 100%);
  }

  .wave-layer {
    position: absolute; bottom: -10%; left: -50%; width: 200%; height: 50%;
    opacity: 0.25;
  }
  .wave-layer path { fill: none; stroke-width: 2; }
  .wave-layer.w1 { animation: waveSlide 40s linear infinite; }
  .wave-layer.w1 path { stroke: var(--color-primary); stroke-width: 3; }
  .wave-layer.w2 { animation: waveSlide 55s linear infinite reverse; bottom: -6%; opacity: 0.15; }
  .wave-layer.w2 path { stroke: var(--color-accent); stroke-width: 2; }

  @keyframes waveSlide {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(100px); opacity: 0.10; z-index: 0; pointer-events: none;
  }
  .orb-1 { width: 600px; height: 600px; background: var(--color-accent); top: -15%; right: -5%; animation: orbPulse 14s ease-in-out infinite; }
  .orb-2 { width: 500px; height: 500px; background: var(--color-primary); bottom: 5%; left: -10%; animation: orbPulse 18s ease-in-out infinite reverse; }

  @keyframes orbPulse {
    0%, 100% { transform: scale(1); opacity: 0.08; }
    50%      { transform: scale(1.2); opacity: 0.15; }
  }

  /* Particles */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .particle {
    position: absolute; border-radius: 50%;
    background: var(--color-accent); opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-100vh) translateX(30px); }
  }

  /* ===== LAYOUT ===== */
  .kiosk {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  /* ===== LEFT PANEL — Info ===== */
  .left-panel {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 48px 48px 64px;
  }

  .top-section {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .brand h1 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 44px;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--color-text) 0%, var(--color-accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand .campus {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 16px;
    color: var(--color-muted);
  }

  .clock-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .clock-block .time {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 80px;
    line-height: 1;
    color: var(--color-text);
    letter-spacing: -4px;
  }
  .clock-block .date-text {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    color: var(--color-muted);
  }

  /* ===== TIDES SECTION ===== */
  .tides-section {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 28px;
  }

  .tides-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .tides-header h2 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 22px;
    color: var(--color-text);
  }
  .tides-header .tide-badge {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: var(--radius-pill);
  }
  .tide-badge.rising {
    color: var(--color-accent);
    background: rgba(0, 180, 216, 0.1);
    border: 1px solid rgba(0, 180, 216, 0.25);
  }
  .tide-badge.falling {
    color: var(--color-warning);
    background: rgba(244, 162, 97, 0.1);
    border: 1px solid rgba(244, 162, 97, 0.25);
  }

  .tides-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .tide-entry {
    background: var(--color-surface);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    backdrop-filter: var(--blur-glass);
    -webkit-backdrop-filter: var(--blur-glass);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.4s ease;
  }
  .tide-entry:hover {
    border-color: rgba(0, 180, 216, 0.15);
  }
  .tide-entry.is-next {
    border-color: rgba(0, 180, 216, 0.25);
    box-shadow: 0 4px 20px rgba(0, 180, 216, 0.10);
  }

  .tide-icon {
    font-size: 22px;
    width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  .tide-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .tide-info .tide-type {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 15px;
    color: var(--color-text);
  }
  .tide-info .tide-time {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 13px;
    color: var(--color-muted);
  }

  .tide-height {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 22px;
    color: var(--color-accent);
    line-height: 1;
  }
  .tide-height .th-unit {
    font-weight: 300;
    font-size: 13px;
    color: var(--color-muted);
  }

  .tide-entry.type-low .tide-height {
    color: var(--color-warning);
  }

  .tides-loading {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 0;
    color: var(--color-muted);
    font-size: 15px;
  }
  .tides-loading .mini-ring {
    width: 20px; height: 20px;
    border: 2px solid rgba(0,180,216,0.15);
    border-top-color: var(--color-accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .tide-source {
    margin-top: 10px;
    font-family: var(--font-sans);
    font-size: 11px;
    color: rgba(155, 164, 181, 0.35);
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .week-label {
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 14px;
    color: rgba(155, 164, 181, 0.45);
    border-top: 1px solid rgba(255,255,255,0.04);
    padding-top: 16px;
  }

  /* ===== RIGHT PANEL — Event List ===== */
  .right-panel {
    position: relative;
    overflow: hidden;
  }

  /* Fade masks top/bottom */
  .right-panel::before,
  .right-panel::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 80px;
    z-index: 20;
    pointer-events: none;
  }
  .right-panel::before {
    top: 0;
    background: linear-gradient(180deg, var(--color-bg) 0%, transparent 100%);
  }
  .right-panel::after {
    bottom: 0;
    background: linear-gradient(0deg, var(--color-bg) 0%, transparent 100%);
  }

  .scroll-container {
    height: 100%;
    overflow-y: auto;
    padding: 80px 56px 80px 24px;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  /* Day section */
  .day-section {
    margin-bottom: 36px;
  }

  .day-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    padding-left: 4px;
  }
  .day-header .day-name {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 28px;
    color: var(--color-text);
  }
  .day-header .day-name.is-today {
    color: var(--color-warning);
  }
  .day-header .day-date {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 16px;
    color: var(--color-muted);
  }
  .day-header .day-count {
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 13px;
    color: var(--color-accent);
    background: rgba(0, 180, 216, 0.08);
    border: 1px solid rgba(0, 180, 216, 0.15);
    border-radius: var(--radius-pill);
    padding: 3px 12px;
  }

  /* Event card */
  .event-item {
    background: var(--color-surface);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: var(--radius-card);
    backdrop-filter: var(--blur-glass);
    -webkit-backdrop-filter: var(--blur-glass);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    padding: 24px 28px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 0.4s ease,
                border-color 0.4s ease;
    animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .event-item:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    border-color: rgba(0, 180, 216, 0.15);
  }

  @keyframes cardEnter {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Glow line on left */
  .event-item::before {
    content: '';
    position: absolute;
    top: 12px; bottom: 12px; left: 0;
    width: 3px;
    border-radius: 0 3px 3px 0;
  }
  .event-item.type-academico::before { background: var(--color-accent); }
  .event-item.type-club::before { background: var(--color-green); }
  .event-item.type-deporte::before { background: var(--color-warning); }
  .event-item.type-social::before { background: #E879F9; }
  .event-item.type-bienestar::before { background: #34D399; }
  .event-item.type-evento::before { background: var(--color-muted); }

  .event-item .ev-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .ev-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .type-academico .ev-dot { background: var(--color-accent); box-shadow: 0 0 8px rgba(0,180,216,0.4); }
  .type-club .ev-dot { background: var(--color-green); box-shadow: 0 0 8px rgba(45,212,160,0.4); }
  .type-deporte .ev-dot { background: var(--color-warning); box-shadow: 0 0 8px rgba(244,162,97,0.4); }
  .type-social .ev-dot { background: #E879F9; box-shadow: 0 0 8px rgba(232,121,249,0.4); }
  .type-bienestar .ev-dot { background: #34D399; box-shadow: 0 0 8px rgba(52,211,153,0.4); }
  .type-evento .ev-dot { background: var(--color-muted); }

  .ev-time {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.5px;
  }
  .type-academico .ev-time { color: var(--color-accent); }
  .type-club .ev-time { color: var(--color-green); }
  .type-deporte .ev-time { color: var(--color-warning); }
  .type-social .ev-time { color: #E879F9; }
  .type-bienestar .ev-time { color: #34D399; }
  .type-evento .ev-time { color: var(--color-muted); }

  .ev-title {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 24px;
    line-height: 1.2;
    color: var(--color-text);
    margin-bottom: 6px;
  }

  .ev-location {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 15px;
    color: var(--color-muted);
  }
  .ev-location svg { flex-shrink: 0; opacity: 0.6; }

  /* Happening now pulse */
  .event-item.is-now {
    border-color: rgba(0, 180, 216, 0.3);
    box-shadow: 0 4px 24px rgba(0, 180, 216, 0.12);
  }
  .event-item.is-now::after {
    content: 'AHORA';
    position: absolute;
    top: 12px; right: 16px;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--color-accent);
    background: rgba(0, 180, 216, 0.12);
    border: 1px solid rgba(0, 180, 216, 0.25);
    border-radius: var(--radius-pill);
    padding: 4px 12px;
    animation: nowPulse 2s ease-in-out infinite;
  }
  @keyframes nowPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 60px;
  }
  .empty-state h2 {
    font-family: var(--font-serif);
    font-style: italic;
    font-weight: 400;
    font-size: 32px;
    color: var(--color-muted);
  }
  .empty-state p {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 16px;
    color: rgba(155, 164, 181, 0.5);
    margin-top: 12px;
  }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
  }
  .loading-ring {
    width: 48px; height: 48px;
    border: 3px solid rgba(0, 180, 216, 0.12);
    border-top-color: var(--color-accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: 16px;
    color: var(--color-muted);
  }

  /* Status badge */
  .status-badge {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: rgba(0, 180, 216, 0.12);
    border: 1px solid rgba(0, 180, 216, 0.25);
    border-radius: var(--radius-pill);
    padding: 8px 24px;
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 14px;
    color: var(--color-accent);
    z-index: 200;
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .status-badge.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Stagger animation delays */
  .event-item:nth-child(1) { animation-delay: 0s; }
  .event-item:nth-child(2) { animation-delay: 0.08s; }
  .event-item:nth-child(3) { animation-delay: 0.16s; }
  .event-item:nth-child(4) { animation-delay: 0.24s; }
  .event-item:nth-child(5) { animation-delay: 0.32s; }
  .event-item:nth-child(6) { animation-delay: 0.4s; }

  /* Auto-scroll indicator */
  .scroll-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.4;
    animation: hintBounce 2s ease-in-out infinite;
    pointer-events: none;
  }
  .scroll-hint span {
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--color-muted);
  }
  @keyframes hintBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="ocean-bg">
  <svg class="wave-layer w1" viewBox="0 0 2400 400" preserveAspectRatio="none">
    <path d="M0,200 C150,280 350,120 600,200 C850,280 1050,120 1200,200 C1350,280 1550,120 1800,200 C2050,280 2250,120 2400,200" />
    <path d="M0,240 C200,310 400,170 600,240 C800,310 1000,170 1200,240 C1400,310 1600,170 1800,240 C2000,310 2200,170 2400,240" />
    <path d="M0,280 C180,340 380,220 600,280 C820,340 1020,220 1200,280 C1380,340 1580,220 1800,280 C2020,340 2220,220 2400,280" />
  </svg>
  <svg class="wave-layer w2" viewBox="0 0 2400 400" preserveAspectRatio="none">
    <path d="M0,220 C200,300 400,140 700,220 C1000,300 1200,140 1500,220 C1800,300 2000,140 2400,220" />
    <path d="M0,260 C250,330 500,190 750,260 C1000,330 1250,190 1500,260 C1750,330 2000,190 2400,260" />
  </svg>
</div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="particles" id="particles"></div>
<div class="status-badge" id="statusBadge"></div>

<!-- Main layout -->
<div class="kiosk">
  <!-- Left: Title + Clock + Sea Conditions -->
  <div class="left-panel">
    <div class="top-section">
      <div class="brand">
        <h1>¿Qué pasa<br>en la USFQ?</h1>
        <div class="campus">Galápagos · San Cristóbal</div>
      </div>
      <div class="clock-block">
        <div class="time" id="clock">--:--</div>
        <div class="date-text" id="dateText">cargando...</div>
      </div>
    </div>

    <div class="tides-section">
      <div class="tides-header">
        <h2>Mareas Hoy</h2>
        <span class="tide-badge" id="tideBadge" style="display:none;">—</span>
      </div>
      <div id="tidesContent">
        <div class="tides-loading">
          <div class="mini-ring"></div>
          Consultando mareas...
        </div>
      </div>
      <div class="tide-source">NOAA · Estación San Cristóbal #9992401</div>
    </div>

    <div class="week-label" id="weekLabel"></div>
  </div>

  <!-- Right: Event list -->
  <div class="right-panel">
    <div class="scroll-container" id="scrollContainer">
      <div id="eventList">
        <div class="loading-state" id="loadingState">
          <div class="loading-ring"></div>
          <p>Conectando con el calendario...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const ICS_URL = 'https://outlook.office365.com/owa/calendar/71a3663561a843bca1cccea1dffd9fa6@usfq.edu.ec/7755590ea9af4dcb84b49fb91d1b2a0f13028026135859137563/calendar.ics';
const CORS_PROXIES = [
  url => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => url  // directo (funciona si se sirve desde servidor local)
];
const REFRESH_INTERVAL = 120000; // 2 minutos
const AUTO_SCROLL_SPEED = 0.4; // px per frame
const AUTO_SCROLL_PAUSE = 8000; // pause at bottom before resetting
const GALAPAGOS_TZ = 'America/Costa_Rica'; // UTC-6, equivalente a Galápagos

const NOAA_ENDPOINT = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter';
const NOAA_STATION = '9992401'; // San Cristóbal, Galápagos

let events = [];
let autoScrolling = true;
let scrollPaused = false;
let userInteracted = false;
let userInteractTimer = null;

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const opts = { timeZone: GALAPAGOS_TZ };
  document.getElementById('clock').textContent =
    now.toLocaleString('es-EC', { ...opts, hour: '2-digit', minute: '2-digit', hour12: false });

  const day = now.toLocaleString('es-EC', { ...opts, weekday: 'long' });
  const d = now.toLocaleString('es-EC', { ...opts, day: 'numeric' });
  const m = now.toLocaleString('es-EC', { ...opts, month: 'long' });
  document.getElementById('dateText').textContent =
    `${day.charAt(0).toUpperCase() + day.slice(1)}, ${d} de ${m}`;
}
setInterval(updateClock, 1000);
updateClock();

// ===== ICS PARSER =====
function parseICS(text) {
  const vevents = [];
  const blocks = text.split('BEGIN:VEVENT');
  blocks.shift();

  for (const block of blocks) {
    const raw = block.split('END:VEVENT')[0];
    const unfolded = raw.replace(/\r?\n[ \t]/g, '');
    const lines = unfolded.split(/\r?\n/);
    const ev = {};

    for (const line of lines) {
      const ci = line.indexOf(':');
      if (ci < 0) continue;
      const keyPart = line.substring(0, ci);
      const value = line.substring(ci + 1);
      const key = keyPart.split(';')[0].trim();

      if (key === 'SUMMARY') ev.summary = value.replace(/\\n/g, ' ').replace(/\\,/g, ',').trim();
      if (key === 'DTSTART') ev.dtstart = parseICSDate(value, keyPart);
      if (key === 'DTEND') ev.dtend = parseICSDate(value, keyPart);
      if (key === 'LOCATION') ev.location = value.replace(/\\n/g, ' ').replace(/\\,/g, ',').trim();
      if (key === 'DESCRIPTION') ev.description = value.replace(/\\n/g, '\n').replace(/\\,/g, ',').trim();
      if (key === 'RRULE') ev.rrule = value;
    }
    if (ev.summary && ev.dtstart) vevents.push(ev);
  }
  return expandAndSort(vevents);
}

function parseICSDate(value, keyPart) {
  const isDate = keyPart.includes('VALUE=DATE') || (value.length === 8 && !value.includes('T'));
  const clean = value.replace('Z', '');

  // Eventos de día completo: anclar a Galápagos UTC-6
  if (isDate) return new Date(clean.slice(0,4)+'-'+clean.slice(4,6)+'-'+clean.slice(6,8)+'T00:00:00-06:00');

  const y=clean.slice(0,4), mo=clean.slice(4,6), d=clean.slice(6,8);
  const h=clean.slice(9,11), mi=clean.slice(11,13), s=clean.slice(13,15)||'00';

  // Si termina en Z → UTC explícito
  if (value.endsWith('Z')) return new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}Z`);

  // Resolver offset según TZID de Microsoft
  const offset = resolveMicrosoftTZID(keyPart);
  return new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}${offset}`);
}

function resolveMicrosoftTZID(keyPart) {
  const tzMatch = keyPart.match(/TZID="([^"]+)"/) || keyPart.match(/TZID=([^;:]+)/);
  if (!tzMatch) return '-06:00'; // sin TZID → asumir Galápagos

  const tz = tzMatch[1].toLowerCase();

  // UTC variants
  if (tz.includes('utc') || tz.includes('greenwich') || tz.includes('gmt standard'))
    return '+00:00';

  // UTC-6 sin DST (Galápagos, Centro América, Saskatchewan)
  if (tz.includes('central america') || tz.includes('canada central'))
    return '-06:00';

  // US Central (con DST, pero para Galápagos tratamos como -06:00)
  if (tz.includes('central standard') || tz.includes('central time'))
    return '-06:00';

  // Ecuador continental / Colombia / Perú = UTC-5
  if (tz.includes('sa pacific') || tz.includes('colombia') || tz.includes('lima') || tz.includes('bogota') || tz.includes('guayaquil'))
    return '-05:00';

  // US Eastern = UTC-5 (sin considerar DST para simplicidad)
  if (tz.includes('eastern'))
    return '-05:00';

  // Fallback: Galápagos UTC-6
  return '-06:00';
}

function getWeekBounds() {
  const now = new Date();
  const day = now.getDay();
  const diffToMon = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diffToMon);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { monday, sunday };
}

function expandAndSort(vevents) {
  const { monday, sunday } = getWeekBounds();
  let expanded = [];
  for (const ev of vevents) {
    if (ev.rrule) {
      expanded.push(...expandRRule(ev, monday, sunday));
    } else if (ev.dtstart >= monday && ev.dtstart <= sunday) {
      expanded.push({ ...ev });
    }
  }
  const seen = new Set();
  expanded = expanded.filter(ev => {
    const key = ev.summary + '|' + ev.dtstart.toISOString().slice(0,16);
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
  return expanded.sort((a, b) => a.dtstart - b.dtstart);
}

function expandRRule(ev, from, to) {
  const rule = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); rule[k] = v; });
  const instances = [];
  const freq = rule.FREQ;
  const until = rule.UNTIL ? parseICSDate(rule.UNTIL, '') : to;
  const count = rule.COUNT ? parseInt(rule.COUNT) : 200;
  const interval = rule.INTERVAL ? parseInt(rule.INTERVAL) : 1;
  const byDay = rule.BYDAY ? rule.BYDAY.split(',') : null;
  const dayMap = { SU:0, MO:1, TU:2, WE:3, TH:4, FR:5, SA:6 };
  let cursor = new Date(ev.dtstart);
  let gen = 0;
  const dur = ev.dtend ? (ev.dtend - ev.dtstart) : 3600000;
  while (cursor <= until && cursor <= to && gen < count) {
    if (cursor >= from) {
      let inc = true;
      if (byDay) inc = byDay.some(d => dayMap[d] === cursor.getDay());
      if (inc) {
        instances.push({ ...ev, dtstart: new Date(cursor), dtend: new Date(cursor.getTime()+dur), rrule: undefined });
        gen++;
      }
    }
    if (freq === 'DAILY') cursor.setDate(cursor.getDate() + 1);
    else if (freq === 'WEEKLY') {
      cursor.setDate(cursor.getDate() + (byDay && byDay.length > 1 ? 1 : 7 * interval));
    } else if (freq === 'MONTHLY') cursor.setMonth(cursor.getMonth() + interval);
    else cursor.setDate(cursor.getDate() + 1);
  }
  return instances;
}

// ===== FETCH =====
function bustCache(url) {
  // Agregar timestamp para evitar caché de proxies
  const sep = url.includes('?') ? '&' : '?';
  return url + sep + '_t=' + Date.now();
}

async function fetchCalendar() {
  showStatus('Actualizando...');
  for (const proxy of CORS_PROXIES) {
    try {
      const url = bustCache(proxy(ICS_URL));
      const resp = await fetch(url, { cache: 'no-store' });
      const text = await resp.text();
      if (!text.includes('BEGIN:VCALENDAR')) continue;
      const parsed = parseICS(text);
      if (parsed.length > 0) {
        events = parsed;
        showStatus(`${events.length} eventos esta semana`);
        setTimeout(hideStatus, 3000);
        return true;
      }
    } catch(e) { continue; }
  }
  showStatus('Usando datos de respaldo');
  setTimeout(hideStatus, 3000);
  useFallbackData();
  return false;
}

function useFallbackData() {
  const nxt = (dow, h, m) => {
    const now = new Date(), d = new Date(now);
    const diff = (dow - d.getDay() + 7) % 7;
    d.setDate(d.getDate() + (diff === 0 && d.getHours() >= h ? 7 : diff));
    d.setHours(h, m, 0, 0); return d;
  };
  events = [
    { summary: 'Club de Jiu-Jitsu', dtstart: nxt(1,7,0), dtend: nxt(1,8,0), location: 'Tatamis' },
    { summary: 'Coloquio: ADN para la Conservación', dtstart: nxt(2,17,30), dtend: nxt(2,19,0), location: 'Salón de la Comunidad' },
    { summary: 'Club de Yoga', dtstart: nxt(3,18,0), dtend: nxt(3,19,30), location: 'Terraza USFQ' },
    { summary: 'Basket Interinstitucional', dtstart: nxt(3,14,0), dtend: nxt(3,16,0), location: 'Gualacata' },
    { summary: 'TardeDePelis', dtstart: nxt(4,17,30), dtend: nxt(4,19,30), location: 'Salón de la Comunidad' },
    { summary: 'Club Alfa Training', dtstart: nxt(5,12,30), dtend: nxt(5,13,30), location: 'Banderas – Lobería – Playa Mann' },
    { summary: 'Club Creative Lab', dtstart: nxt(5,16,0), dtend: nxt(5,18,0), location: 'Pérgola' },
    { summary: 'Club de Peloteo', dtstart: nxt(0,15,30), dtend: nxt(0,17,0), location: 'Cancha Divino Niño' },
  ].sort((a,b) => a.dtstart - b.dtstart);
}

// ===== RENDER =====
function renderEvents() {
  const list = document.getElementById('eventList');
  list.innerHTML = '';

  if (events.length === 0) {
    list.innerHTML = `<div class="empty-state"><h2>No hay eventos esta semana</h2><p>El calendario se actualiza automáticamente</p></div>`;
    return;
  }

  // Group by day
  const groups = new Map();
  const now = new Date();
  events.forEach(ev => {
    const key = ev.dtstart.toDateString();
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(ev);
  });

  let cardIndex = 0;
  groups.forEach((dayEvents, dateKey) => {
    const section = document.createElement('div');
    section.className = 'day-section';

    const d = dayEvents[0].dtstart;
    const dayLabel = getRelativeDay(d);
    const isToday = isSameDay(d, now);
    const dateStr = d.toLocaleDateString('es-EC', { day: 'numeric', month: 'long', timeZone: GALAPAGOS_TZ });

    section.innerHTML = `
      <div class="day-header">
        <span class="day-name ${isToday ? 'is-today' : ''}">${dayLabel}</span>
        <span class="day-date">${dateStr}</span>
        <span class="day-count">${dayEvents.length} evento${dayEvents.length > 1 ? 's' : ''}</span>
      </div>`;

    dayEvents.forEach(ev => {
      const typeClass = 'type-' + detectType(ev.summary);
      const isNow = isHappeningNow(ev, now);
      const card = document.createElement('div');
      card.className = `event-item ${typeClass}${isNow ? ' is-now' : ''}`;
      card.style.animationDelay = (cardIndex * 0.07) + 's';

      card.innerHTML = `
        <div class="ev-top">
          <div class="ev-dot"></div>
          <span class="ev-time">${formatTime(ev.dtstart)}${ev.dtend ? ' – ' + formatTime(ev.dtend) : ''}</span>
        </div>
        <div class="ev-title">${cleanTitle(ev.summary)}</div>
        ${ev.location ? `
        <div class="ev-location">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          ${ev.location.replace(/📍\s?/, '')}
        </div>` : ''}`;
      section.appendChild(card);
      cardIndex++;
    });

    list.appendChild(section);
  });

  // Update week label
  const { monday, sunday } = getWeekBounds();
  const mFmt = monday.toLocaleDateString('es-EC', { day: 'numeric', month: 'short' });
  const sFmt = sunday.toLocaleDateString('es-EC', { day: 'numeric', month: 'short' });
  document.getElementById('weekLabel').textContent =
    `Semana del ${mFmt} al ${sFmt} · ${events.length} eventos`;
}

// ===== AUTO-SCROLL =====
function setupAutoScroll() {
  const container = document.getElementById('scrollContainer');
  let direction = 1;
  let pauseTimeout = null;

  // Pause auto-scroll on user interaction
  container.addEventListener('wheel', onUserInteract, { passive: true });
  container.addEventListener('touchstart', onUserInteract, { passive: true });
  container.addEventListener('mousedown', onUserInteract);

  function onUserInteract() {
    userInteracted = true;
    clearTimeout(userInteractTimer);
    userInteractTimer = setTimeout(() => { userInteracted = false; }, 15000);
  }

  function scrollStep() {
    if (userInteracted) {
      requestAnimationFrame(scrollStep);
      return;
    }

    const maxScroll = container.scrollHeight - container.clientHeight;
    if (maxScroll <= 0) {
      requestAnimationFrame(scrollStep);
      return;
    }

    if (!scrollPaused) {
      container.scrollTop += AUTO_SCROLL_SPEED * direction;

      // Hit bottom
      if (container.scrollTop >= maxScroll - 1) {
        scrollPaused = true;
        clearTimeout(pauseTimeout);
        pauseTimeout = setTimeout(() => {
          direction = -1;
          scrollPaused = false;
        }, AUTO_SCROLL_PAUSE);
      }
      // Hit top
      if (container.scrollTop <= 1 && direction === -1) {
        scrollPaused = true;
        clearTimeout(pauseTimeout);
        pauseTimeout = setTimeout(() => {
          direction = 1;
          scrollPaused = false;
        }, AUTO_SCROLL_PAUSE);
      }
    }

    requestAnimationFrame(scrollStep);
  }

  requestAnimationFrame(scrollStep);
}

// ===== HELPERS =====
function formatTime(d) {
  return d.toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: GALAPAGOS_TZ }).toUpperCase();
}

function isSameDay(a, b) {
  return a.toDateString() === b.toDateString();
}

function getRelativeDay(d) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((target - today) / 86400000);
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Mañana';
  if (diff === -1) return 'Ayer';
  const name = d.toLocaleDateString('es-EC', { weekday: 'long', timeZone: GALAPAGOS_TZ });
  return name.charAt(0).toUpperCase() + name.slice(1);
}

function isHappeningNow(ev, now) {
  return ev.dtstart <= now && ev.dtend && ev.dtend >= now;
}

function cleanTitle(s) {
  return (s || 'Evento').trim();
}

function detectType(summary) {
  const s = summary.toLowerCase();
  if (s.includes('coloquio') || s.includes('taller') || s.includes('charla') || s.includes('seminario')) return 'academico';
  if (s.includes('club') || s.includes('training') || s.includes('creative')) return 'club';
  if (s.includes('basket') || s.includes('peloteo') || s.includes('jiu') || s.includes('alfa')) return 'deporte';
  if (s.includes('pelis') || s.includes('pizza') || s.includes('celebra') || s.includes('almuerzo')) return 'social';
  if (s.includes('mental') || s.includes('salud') || s.includes('bienestar') || s.includes('yoga')) return 'bienestar';
  return 'evento';
}

function showStatus(msg) {
  const el = document.getElementById('statusBadge');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideStatus() {
  document.getElementById('statusBadge').classList.remove('visible');
}

// ===== TIDES — NOAA API =====
async function fetchTides() {
  try {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-CA', { timeZone: GALAPAGOS_TZ }).replace(/-/g, '');
    const url = `${NOAA_ENDPOINT}?begin_date=${dateStr}&end_date=${dateStr}&station=${NOAA_STATION}&product=predictions&datum=MLLW&time_zone=lst&interval=hilo&units=metric&format=json`;

    const resp = await fetch(url, { cache: 'no-cache' });
    if (!resp.ok) throw new Error('NOAA API error ' + resp.status);
    const data = await resp.json();

    if (data.predictions && data.predictions.length > 0) {
      renderTides(data.predictions);
    } else {
      renderTidesFallback();
    }
  } catch (e) {
    console.warn('NOAA tides error:', e);
    renderTidesFallback();
  }
}

function renderTides(predictions) {
  const container = document.getElementById('tidesContent');
  const badge = document.getElementById('tideBadge');
  const now = new Date();

  // Determinar la próxima marea
  let nextIdx = -1;
  for (let i = 0; i < predictions.length; i++) {
    const tideTime = parseTideTime(predictions[i].t);
    if (tideTime > now) { nextIdx = i; break; }
  }

  // Determinar si la marea está subiendo o bajando
  let tidePhase = 'rising';
  if (nextIdx >= 0) {
    tidePhase = predictions[nextIdx].type === 'H' ? 'rising' : 'falling';
  }

  badge.textContent = tidePhase === 'rising' ? 'Subiendo' : 'Bajando';
  badge.className = 'tide-badge ' + tidePhase;
  badge.style.display = 'inline-block';

  let html = '<div class="tides-list">';

  predictions.forEach((p, i) => {
    const isHigh = p.type === 'H';
    const isNext = i === nextIdx;
    const height = parseFloat(p.v).toFixed(2);
    const timeParts = p.t.split(' ');
    const timeStr = timeParts[1]; // "HH:MM"
    const tideTime = parseTideTime(p.t);
    const isPast = tideTime < now;

    html += `
      <div class="tide-entry ${isHigh ? 'type-high' : 'type-low'}${isNext ? ' is-next' : ''}" style="${isPast && !isNext ? 'opacity: 0.45;' : ''}">
        <div class="tide-icon">${isHigh ? '🌊' : '🏖️'}</div>
        <div class="tide-info">
          <span class="tide-type">${isHigh ? 'Pleamar' : 'Bajamar'}${isNext ? ' — próxima' : ''}</span>
          <span class="tide-time">${timeStr} h</span>
        </div>
        <div class="tide-height">${height} <span class="th-unit">m</span></div>
      </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function parseTideTime(tStr) {
  // tStr = "2026-03-31 05:12"
  const [datePart, timePart] = tStr.split(' ');
  // NOAA lst = hora local de la estación (Galápagos = UTC-6)
  return new Date(`${datePart}T${timePart}:00-06:00`);
}

function renderTidesFallback() {
  const container = document.getElementById('tidesContent');
  container.innerHTML = `
    <div class="tides-list">
      <div class="tide-entry type-high">
        <div class="tide-icon">🌊</div>
        <div class="tide-info">
          <span class="tide-type">Sin datos de mareas</span>
          <span class="tide-time">Se reintentará automáticamente</span>
        </div>
        <div class="tide-height">— <span class="th-unit">m</span></div>
      </div>
    </div>`;

  const badge = document.getElementById('tideBadge');
  badge.textContent = 'Sin datos';
  badge.className = 'tide-badge falling';
  badge.style.display = 'inline-block';
}

// ===== INIT =====
async function init() {
  // Launch both fetches in parallel
  const [_cal, _tides] = await Promise.allSettled([
    fetchCalendar(),
    fetchTides()
  ]);

  renderEvents();
  setupAutoScroll();

  // Refresh calendar every 10 min
  setInterval(async () => {
    await fetchCalendar();
    renderEvents();
  }, REFRESH_INTERVAL);

  // Refresh tides every hour
  setInterval(fetchTides, 3600000);

  // Re-check "now" status every minute
  setInterval(() => {
    renderEvents();
  }, 60000);
}

init();
</script>
