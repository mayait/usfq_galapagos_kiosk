<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>¿Qué pasa en la USFQ? — Galápagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --verde-galapagos: #00A9A8;
    --azul-pacifico:   #1672A3;
    --verde-bright:    #00E5E0;
    --azul-bright:     #3BB5F0;
    --negro-corp:      #0B0F14;
    --superficie-1:    rgba(11, 15, 20, 0.92);
    --superficie-glass: rgba(11, 15, 20, 0.92);
    --glass-border:    rgba(255, 255, 255, 0.15);
    --glass-border-hover: rgba(255, 255, 255, 0.25);
    --texto-primario:  #F0F2F5;
    --texto-secundario:#B0B8C8;
    --texto-terciario: #6B7585;
    --gradiente:       linear-gradient(135deg, #00A9A8 0%, #1672A3 100%);

    --type-academico:  #3BB5F0;
    --type-club:       #00E5E0;
    --type-deporte:    #FFB347;
    --type-social:     #C084FC;
    --type-bienestar:  #34D399;
    --type-evento:     #94A3B8;

    --font: 'Jost', sans-serif;
    --radius: 18px;
    --radius-pill: 9999px;
  }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: var(--negro-corp);
    font-family: var(--font);
    color: var(--texto-primario);
  }

  /* ===== LAYOUT ===== */
  .kiosk {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 620px 1fr;
  }

  /* ===== LEFT PANEL ===== */
  .left-panel {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 44px 36px 36px 48px;
    background: var(--negro-corp);
    border-right: 1px solid rgba(255,255,255,0.05);
    position: relative;
    z-index: 20;
  }
  /* Gradient strip on top */
  .left-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gradiente);
  }

  .top-section { display: flex; flex-direction: column; gap: 28px; }
  .brand { display: flex; flex-direction: column; gap: 18px; }
  .brand-logo { width: 200px; height: auto; }
  .brand-title { font-weight: 700; font-size: 38px; line-height: 1.15; }
  .brand-title span {
    color: var(--verde-galapagos);
  }

  .clock-block { display: flex; flex-direction: column; gap: 2px; }
  .clock-block .time {
    font-weight: 700; font-size: 80px; line-height: 1;
    color: var(--texto-primario); letter-spacing: -3px;
  }
  .clock-block .date-text { font-weight: 300; font-size: 22px; color: var(--texto-secundario); }

  /* ===== BOTTOM CAROUSEL (tides ↔ CMS posters) ===== */
  .bottom-carousel {
    border-top: 1px solid rgba(255,255,255,0.10);
    padding-top: 22px;
    position: relative;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .carousel-slide {
    position: absolute; top: 22px; left: 0; right: 0; bottom: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    pointer-events: none;
  }
  .carousel-slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* CMS event poster slide */
  .cms-poster {
    display: flex; flex-direction: column; height: 100%;
  }
  .cms-poster-img {
    width: 100%; flex: 1; min-height: 0;
    object-fit: contain; object-position: top center;
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .cms-poster-title {
    font-weight: 600; font-size: 16px; color: var(--texto-primario);
    margin-top: 10px; line-height: 1.2;
  }
  .cms-poster-date {
    font-weight: 300; font-size: 13px; color: var(--texto-secundario);
    margin-top: 2px;
  }

  /* Carousel dots */
  .carousel-dots {
    display: flex; gap: 6px; justify-content: center;
    position: absolute; bottom: 0; left: 0; right: 0;
  }
  .carousel-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }
  .carousel-dot.active {
    background: var(--verde-galapagos);
  }

  /* ===== TIDES ===== */
  .tides-section { padding-top: 0; }
  .tides-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .tides-header h2 { font-weight: 700; font-size: 22px; color: var(--texto-primario); }
  .tide-badge {
    font-weight: 500; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 14px; border-radius: var(--radius-pill);
  }
  .tide-badge.rising {
    color: var(--verde-bright); background: rgba(0,80,78,0.6); border: 1px solid rgba(0,229,224,0.4);
  }
  .tide-badge.falling {
    color: var(--azul-bright); background: rgba(22,70,110,0.6); border: 1px solid rgba(59,181,240,0.4);
  }
  .tides-list { display: flex; flex-direction: column; gap: 7px; }
  .tide-entry {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.3s ease;
  }
  .tide-entry.is-next {
    border-color: rgba(0,229,224,0.5); background: rgba(0,169,168,0.15);
    box-shadow: 0 2px 14px rgba(0,169,168,0.2);
  }
  .tide-icon { width: 28px; height: 22px; text-align: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .tide-icon svg { width: 24px; height: 20px; }
  .tide-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .tide-info .tide-type { font-weight: 600; font-size: 16px; color: var(--texto-primario); }
  .tide-info .tide-time { font-weight: 300; font-size: 14px; color: var(--texto-secundario); }
  .tide-height { font-weight: 700; font-size: 22px; color: var(--verde-bright); }
  .tide-entry.type-low .tide-height { color: var(--azul-bright); }
  .tide-height .th-unit { font-weight: 300; font-size: 13px; color: var(--texto-terciario); }
  .tides-loading { display: flex; align-items: center; gap: 10px; padding: 14px 0; color: var(--texto-secundario); font-size: 15px; }
  .tides-loading .mini-ring {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.08); border-top-color: var(--verde-galapagos);
    border-radius: 50%; animation: spin 1s linear infinite;
  }
  .tide-source { margin-top: 6px; font-size: 12px; color: var(--texto-terciario); letter-spacing: 0.5px; }
  .week-label { font-weight: 400; font-size: 15px; color: var(--texto-terciario); border-top: 1px solid rgba(255,255,255,0.10); padding-top: 14px; }

  /* ===== RIGHT PANEL — PHOTO BACKGROUND ===== */
  .right-panel {
    position: relative;
    overflow: hidden;
  }

  /* Photo slideshow layer */
  .photo-slideshow {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0; z-index: 0;
  }
  .photo-slideshow img {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.8s ease-in-out;
  }
  .photo-slideshow img.active {
    opacity: 1;
  }

  /* Dark overlay on top of photos for contrast */
  .photo-overlay {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0; z-index: 1;
    background: linear-gradient(
      180deg,
      rgba(8, 12, 18, 0.70) 0%,
      rgba(8, 12, 18, 0.50) 30%,
      rgba(8, 12, 18, 0.45) 60%,
      rgba(8, 12, 18, 0.75) 100%
    );
    pointer-events: none;
  }

  /* Gradient strip at top of right panel too */
  .right-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gradiente);
    z-index: 30;
  }

  /* Fade edges for scroll */
  .scroll-fade-top, .scroll-fade-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 80px;
    z-index: 15;
    pointer-events: none;
  }
  .scroll-fade-top {
    top: 3px;
    background: linear-gradient(180deg, rgba(8,12,18,0.95) 0%, transparent 100%);
  }
  .scroll-fade-bottom {
    bottom: 0;
    background: linear-gradient(0deg, rgba(8,12,18,0.95) 0%, transparent 100%);
  }

  .scroll-container {
    position: relative; z-index: 10;
    height: 100%;
    overflow-y: auto;
    padding: 50px 52px 50px 44px;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .scroll-container::-webkit-scrollbar { display: none; }

  /* ===== DAY SECTION ===== */
  .day-section { margin-bottom: 18px; }
  .day-header {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 8px; padding-left: 4px;
  }
  .day-header .day-name {
    font-weight: 700; font-size: 38px; letter-spacing: -0.5px;
    color: var(--texto-primario);
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .day-header .day-name.is-today {
    color: var(--verde-galapagos);
  }
  .day-header .day-date {
    font-weight: 300; font-size: 20px;
    color: var(--texto-secundario);
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .day-header .day-count {
    font-weight: 500; font-size: 15px;
    color: var(--verde-bright);
    background: rgba(0,80,78,0.7);
    border: 1px solid rgba(0,229,224,0.35);
    border-radius: var(--radius-pill); padding: 4px 14px;
  }

  /* ===== EVENT CARD — GLASS ===== */
  .event-item {
    background: var(--superficie-glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    padding: 12px 20px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Left accent bar */
  .event-item::before {
    content: ''; position: absolute;
    top: 6px; bottom: 6px; left: 0;
    width: 3px; border-radius: 0 3px 3px 0;
  }
  .event-item.type-academico::before { background: var(--type-academico); box-shadow: 0 0 12px rgba(59,181,240,0.3); }
  .event-item.type-club::before      { background: var(--type-club); box-shadow: 0 0 12px rgba(0,229,224,0.3); }
  .event-item.type-deporte::before   { background: var(--type-deporte); box-shadow: 0 0 12px rgba(255,179,71,0.3); }
  .event-item.type-social::before    { background: var(--type-social); box-shadow: 0 0 12px rgba(192,132,252,0.3); }
  .event-item.type-bienestar::before { background: var(--type-bienestar); box-shadow: 0 0 12px rgba(52,211,153,0.3); }
  .event-item.type-evento::before    { background: var(--type-evento); }

  .ev-top { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .ev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .type-academico .ev-dot { background: var(--type-academico); box-shadow: 0 0 6px rgba(59,181,240,0.4); }
  .type-club .ev-dot      { background: var(--type-club); box-shadow: 0 0 6px rgba(0,229,224,0.4); }
  .type-deporte .ev-dot   { background: var(--type-deporte); box-shadow: 0 0 6px rgba(255,179,71,0.4); }
  .type-social .ev-dot    { background: var(--type-social); box-shadow: 0 0 6px rgba(192,132,252,0.4); }
  .type-bienestar .ev-dot { background: var(--type-bienestar); box-shadow: 0 0 6px rgba(52,211,153,0.4); }
  .type-evento .ev-dot    { background: var(--type-evento); }

  .ev-time { font-weight: 500; font-size: 16px; letter-spacing: 0.3px; }
  .type-academico .ev-time { color: var(--type-academico); }
  .type-club .ev-time      { color: var(--type-club); }
  .type-deporte .ev-time   { color: var(--type-deporte); }
  .type-social .ev-time    { color: var(--type-social); }
  .type-bienestar .ev-time { color: var(--type-bienestar); }
  .type-evento .ev-time    { color: var(--type-evento); }

  .ev-title {
    font-weight: 700; font-size: 24px; line-height: 1.15;
    color: var(--texto-primario);
    margin-bottom: 2px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .ev-location {
    display: flex; align-items: center; gap: 5px;
    font-weight: 300; font-size: 15px; color: var(--texto-secundario);
  }
  .ev-location svg { flex-shrink: 0; opacity: 0.4; }

  /* Happening now */
  .event-item.is-now {
    border-color: rgba(0,229,224,0.5);
    box-shadow: 0 4px 28px rgba(0,169,168,0.3);
    background: rgba(0,169,168,0.2);
  }
  .event-item.is-now::after {
    content: 'AHORA';
    position: absolute; top: 10px; right: 14px;
    font-weight: 700; font-size: 13px; letter-spacing: 2px;
    color: #0B0F14;
    background: var(--gradiente);
    border-radius: var(--radius-pill);
    padding: 4px 14px;
    animation: nowPulse 2s ease-in-out infinite;
  }
  @keyframes nowPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }


  /* Empty & Loading */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; text-align: center; padding: 60px;
  }
  .empty-state h2 { font-weight: 300; font-size: 32px; color: var(--texto-secundario); text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .empty-state p { font-weight: 300; font-size: 18px; color: var(--texto-terciario); margin-top: 10px; }

  .loading-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 18px;
  }
  .loading-ring {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--verde-galapagos);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-weight: 300; font-size: 18px; color: var(--texto-secundario); }

  /* Status badge */
  .status-badge {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%) translateY(-50px);
    background: rgba(11,15,20,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-pill);
    padding: 8px 24px;
    font-weight: 400; font-size: 15px;
    color: var(--verde-bright);
    z-index: 200; opacity: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .status-badge.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Recurring schedule line */
  .ev-schedule {
    display: flex; align-items: center; gap: 6px;
    font-weight: 500; font-size: 15px; color: var(--texto-secundario);
    margin-top: 4px;
  }
  .ev-schedule svg { flex-shrink: 0; opacity: 0.5; }
  .ev-schedule .recurring-badge {
    font-weight: 600; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--verde-bright); background: rgba(0,80,78,0.5);
    border: 1px solid rgba(0,229,224,0.3);
    border-radius: var(--radius-pill); padding: 2px 10px; margin-left: 6px;
  }

  /* Stagger */
  .event-item:nth-child(1) { animation-delay: 0s; }
  .event-item:nth-child(2) { animation-delay: 0.06s; }
  .event-item:nth-child(3) { animation-delay: 0.12s; }
  .event-item:nth-child(4) { animation-delay: 0.18s; }
  .event-item:nth-child(5) { animation-delay: 0.24s; }
  .event-item:nth-child(6) { animation-delay: 0.30s; }
  .event-item:nth-child(7) { animation-delay: 0.36s; }
  .event-item:nth-child(8) { animation-delay: 0.42s; }
</style>
</head>
<body>

<div class="status-badge" id="statusBadge"></div>

<!-- Main layout -->
<div class="kiosk">
  <!-- Left -->
  <div class="left-panel">
    <div class="top-section">
      <div class="brand">
        <img src="img/USGQG-LOGO-NUEVO-BLANCO.png" alt="USFQ Galápagos" class="brand-logo">
        <div class="brand-title"><span>¿Qué pasa</span><br><span>en la USFQ?</span></div>
      </div>
      <div class="clock-block">
        <div class="time" id="clock">--:--</div>
        <div class="date-text" id="dateText">cargando...</div>
      </div>
    </div>

    <div class="bottom-carousel" id="bottomCarousel">
      <!-- Slide 0: Tides -->
      <div class="carousel-slide active" id="slideTides">
        <div class="tides-section">
          <div class="tides-header">
            <h2>Mareas Hoy</h2>
            <span class="tide-badge" id="tideBadge" style="display:none;">—</span>
          </div>
          <div id="tidesContent">
            <div class="tides-loading">
              <div class="mini-ring"></div>
              Consultando mareas...
            </div>
          </div>
          <div class="tide-source">NOAA · Estación San Cristóbal #9992401</div>
        </div>
      </div>
      <!-- CMS poster slides injected dynamically -->
      <div class="carousel-dots" id="carouselDots"></div>
    </div>

    <div class="week-label" id="weekLabel"></div>
  </div>

  <!-- Right — photo background + glass events -->
  <div class="right-panel">
    <!-- Photo slideshow -->
    <div class="photo-slideshow" id="photoSlideshow"></div>
    <!-- Dark overlay -->
    <div class="photo-overlay"></div>
    <!-- Scroll fades -->
    <div class="scroll-fade-top"></div>
    <div class="scroll-fade-bottom"></div>
    <!-- Events -->
    <div class="scroll-container" id="scrollContainer">
      <div id="eventList">
        <div class="loading-state" id="loadingState">
          <div class="loading-ring"></div>
          <p>Conectando con el calendario...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const ICS_URL = 'https://outlook.office365.com/owa/calendar/71a3663561a843bca1cccea1dffd9fa6@usfq.edu.ec/7755590ea9af4dcb84b49fb91d1b2a0f13028026135859137563/calendar.ics';
const CORS_PROXIES = [
  url => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => url
];
const REFRESH_INTERVAL = 120000;
const AUTO_SCROLL_SPEED = 0.4;
const AUTO_SCROLL_PAUSE = 8000;
const GALAPAGOS_TZ = 'America/Costa_Rica';
const NOAA_ENDPOINT = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter';
const NOAA_STATION = '9992401';

// Photo slideshow config
const PHOTO_COUNT = 61;
const PHOTO_INTERVAL = 12000; // 12 seconds per photo
const PHOTO_PATH = 'img/photos/';

// CMS Events API (posters for left panel carousel)
const CMS_API = 'https://usfq.juli.wiki/carteleras/events-cms/api/events.php';
const CMS_REFRESH_MS = 300000; // 5 minutes
const CAROUSEL_INTERVAL = 10000; // 10 seconds per slide

let events = [];
let cmsPosters = [];
let autoScrolling = true;
let scrollPaused = false;
let userInteracted = false;
let userInteractTimer = null;

// ===== PHOTO SLIDESHOW =====
function initPhotoSlideshow() {
  const container = document.getElementById('photoSlideshow');

  // Shuffle photo order randomly
  const indices = Array.from({ length: PHOTO_COUNT }, (_, i) => i + 1);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }

  // Preload first 3, lazy-load rest
  const preloadCount = 3;
  indices.forEach((num, i) => {
    const img = document.createElement('img');
    img.alt = `Galápagos ${num}`;
    if (i < preloadCount) {
      img.src = `${PHOTO_PATH}${num}.webp`;
    } else {
      img.dataset.src = `${PHOTO_PATH}${num}.webp`;
    }
    if (i === 0) img.classList.add('active');
    container.appendChild(img);
  });

  let current = 0;
  const images = container.querySelectorAll('img');

  setInterval(() => {
    images[current].classList.remove('active');
    current = (current + 1) % images.length;

    // Lazy-load current + next
    const nextImg = images[current];
    if (nextImg.dataset.src && !nextImg.src) nextImg.src = nextImg.dataset.src;
    const nextNext = (current + 1) % images.length;
    const nn = images[nextNext];
    if (nn.dataset.src && !nn.src) nn.src = nn.dataset.src;

    nextImg.classList.add('active');
  }, PHOTO_INTERVAL);
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const opts = { timeZone: GALAPAGOS_TZ };
  document.getElementById('clock').textContent =

// ===== ICS PARSER =====
function parseICS(text) {
  const vevents = [];
  const blocks = text.split('BEGIN:VEVENT');
  blocks.shift();
  for (const block of blocks) {
    const raw = block.split('END:VEVENT')[0];
    const unfolded = raw.replace(/\r?\n[ \t]/g, '');
    const lines = unfolded.split(/\r?\n/);
    const ev = {};
    for (const line of lines) {
      const ci = line.indexOf(':');
      if (ci < 0) continue;
      const keyPart = line.substring(0, ci);
      const value = line.substring(ci + 1);
      const key = keyPart.split(';')[0].trim();
      if (key === 'SUMMARY') ev.summary = value.replace(/\\n/g, ' ').replace(/\\,/g, ',').trim();
      if (key === 'DTSTART') ev.dtstart = parseICSDate(value, keyPart);
      if (key === 'DTEND') ev.dtend = parseICSDate(value, keyPart);
      if (key === 'LOCATION') ev.location = value.replace(/\\n/g, ' ').replace(/\\,/g, ',').trim();
      if (key === 'DESCRIPTION') ev.description = value.replace(/\\n/g, '\n').replace(/\\,/g, ',').trim();
      if (key === 'RRULE') ev.rrule = value;
    }
    if (ev.summary && ev.dtstart) vevents.push(ev);
  }
  return expandAndSort(vevents);
}

function parseICSDate(value, keyPart) {
  const isDate = keyPart.includes('VALUE=DATE') || (value.length === 8 && !value.includes('T'));
  const clean = value.replace('Z', '');
  if (isDate) return new Date(clean.slice(0,4)+'-'+clean.slice(4,6)+'-'+clean.slice(6,8)+'T00:00:00-06:00');
  const y=clean.slice(0,4), mo=clean.slice(4,6), d=clean.slice(6,8);
  const h=clean.slice(9,11), mi=clean.slice(11,13), s=clean.slice(13,15)||'00';
  if (value.endsWith('Z')) return new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}Z`);
  const offset = resolveMicrosoftTZID(keyPart);
  return new Date(`${y}-${mo}-${d}T${h}:${mi}:${s}${offset}`);
}

function resolveMicrosoftTZID(keyPart) {
  const tzMatch = keyPart.match(/TZID="([^"]+)"/) || keyPart.match(/TZID=([^;:]+)/);
  if (!tzMatch) return '-06:00';
  const tz = tzMatch[1].toLowerCase();
  if (tz.includes('utc') || tz.includes('greenwich') || tz.includes('gmt standard')) return '+00:00';
  if (tz.includes('central america') || tz.includes('canada central')) return '-06:00';
  if (tz.includes('central standard') || tz.includes('central time')) return '-06:00';
  if (tz.includes('sa pacific') || tz.includes('colombia') || tz.includes('lima') || tz.includes('bogota') || tz.includes('guayaquil')) return '-05:00';
  if (tz.includes('eastern')) return '-05:00';
  return '-06:00';
}

function getWeekBounds() {
  const now = new Date();
  const day = now.getDay();
  const diffToMon = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diffToMon);
  monday.setHours(0,0,0,0);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { monday, sunday };
}

function expandAndSort(vevents) {
  const { monday, sunday } = getWeekBounds();
  let expanded = [];
  for (const ev of vevents) {
    if (ev.rrule) {
      const instances = expandRRule(ev, monday, sunday);
      instances.forEach(inst => { inst._recurring = true; inst._rrule = ev.rrule; });
      expanded.push(...instances);
    } else if (ev.dtstart >= monday && ev.dtstart <= sunday) {
      expanded.push({ ...ev });
    }
  }
  const seen = new Set();
  expanded = expanded.filter(ev => {
    const key = ev.summary + '|' + ev.dtstart.toISOString().slice(0,16);
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
  return expanded.sort((a, b) => a.dtstart - b.dtstart);
}

// Group recurring events: same summary + same time-of-day + 3+ occurrences → single card
function groupRecurringEvents(evts) {
  const DAY_NAMES_SHORT = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
  const singles = [];
  const recurringMap = new Map();

  for (const ev of evts) {
    if (!ev._recurring) { singles.push(ev); continue; }
    const timeKey = ev.summary + '|' + formatTime(ev.dtstart) + '|' + (ev.dtend ? formatTime(ev.dtend) : '');
    if (!recurringMap.has(timeKey)) recurringMap.set(timeKey, []);
    recurringMap.get(timeKey).push(ev);
  }

  const grouped = [];
  recurringMap.forEach((instances, key) => {
    if (instances.length < 3) {
      singles.push(...instances);
      return;
    }
    const days = [...new Set(instances.map(e => e.dtstart.getDay()))].sort();
    const rep = instances[0];
    let schedule;
    if (days.length >= 5 && days.every(d => d >= 1 && d <= 5)) {
      schedule = 'Lun a Vie';
    } else if (days.length === 7) {
      schedule = 'Todos los días';
    } else {
      schedule = days.map(d => DAY_NAMES_SHORT[d]).join(', ');
    }
    // Check if any instance is happening now
    const now = new Date();
    const anyNow = instances.some(e => isHappeningNow(e, now));
    // Use earliest future instance, or first instance
    const nextInstance = instances.find(e => e.dtstart >= now) || instances[0];
    grouped.push({
      ...rep,
      dtstart: nextInstance.dtstart,
      dtend: nextInstance.dtend,
      _grouped: true,
      _schedule: schedule,
      _instanceCount: instances.length,
      _isNowGrouped: anyNow
    });
  });

  return singles.concat(grouped).sort((a, b) => a.dtstart - b.dtstart);
}

function expandRRule(ev, from, to) {
  const rule = {};
  ev.rrule.split(';').forEach(p => { const [k,v] = p.split('='); rule[k] = v; });
  const instances = [];
  const freq = rule.FREQ;
  const until = rule.UNTIL ? parseICSDate(rule.UNTIL, '') : to;
  const count = rule.COUNT ? parseInt(rule.COUNT) : 200;
  const interval = rule.INTERVAL ? parseInt(rule.INTERVAL) : 1;
  const byDay = rule.BYDAY ? rule.BYDAY.split(',') : null;
  const dayMap = { SU:0, MO:1, TU:2, WE:3, TH:4, FR:5, SA:6 };
  let cursor = new Date(ev.dtstart);
  let gen = 0;
  const dur = ev.dtend ? (ev.dtend - ev.dtstart) : 3600000;
  while (cursor <= until && cursor <= to && gen < count) {
    if (cursor >= from) {
      let inc = true;
      if (byDay) inc = byDay.some(d => dayMap[d] === cursor.getDay());
      if (inc) {
        instances.push({ ...ev, dtstart: new Date(cursor), dtend: new Date(cursor.getTime()+dur), rrule: undefined });
        gen++;
      }
    }
    if (freq === 'DAILY') cursor.setDate(cursor.getDate() + 1);
    else if (freq === 'WEEKLY') {
      cursor.setDate(cursor.getDate() + (byDay && byDay.length > 1 ? 1 : 7 * interval));
    } else if (freq === 'MONTHLY') cursor.setMonth(cursor.getMonth() + interval);
    else cursor.setDate(cursor.getDate() + 1);
  }
  return instances;
}

// ===== FETCH =====
function bustCache(url) {
  const sep = url.includes('?') ? '&' : '?';
  return url + sep + '_t=' + Date.now();
}

async function fetchCalendar() {
  showStatus('Actualizando...');
  for (const proxy of CORS_PROXIES) {
    try {
      const url = bustCache(proxy(ICS_URL));
      const resp = await fetch(url, { cache: 'no-store' });
      const text = await resp.text();
      if (!text.includes('BEGIN:VCALENDAR')) continue;
      const parsed = parseICS(text);
      if (parsed.length > 0) {
        events = parsed;
        showStatus(`${events.length} eventos esta semana`);
        setTimeout(hideStatus, 3000);
        return true;
      }
    } catch(e) { continue; }
  }
  showStatus('Usando datos de respaldo');
  setTimeout(hideStatus, 3000);
  useFallbackData();
  return false;
}

// ===== AUTO-SCROLL =====
function setupAutoScroll() {
  const container = document.getElementById('scrollContainer');
  let direction = 1;
  let pauseTimeout = null;
  container.addEventListener('wheel', onUserInteract, { passive: true });
  container.addEventListener('touchstart', onUserInteract, { passive: true });
  container.addEventListener('mousedown', onUserInteract);
  function onUserInteract() {
    userInteracted = true;
    clearTimeout(userInteractTimer);
    userInteractTimer = setTimeout(() => { userInteracted = false; }, 15000);
  }
  function scrollStep() {
    if (userInteracted) { requestAnimationFrame(scrollStep); return; }
    const maxScroll = container.scrollHeight - container.clientHeight;
    if (maxScroll <= 0) { requestAnimationFrame(scrollStep); return; }
    if (!scrollPaused) {
      container.scrollTop += AUTO_SCROLL_SPEED * direction;
      if (container.scrollTop >= maxScroll - 1) {
        scrollPaused = true;
        clearTimeout(pauseTimeout);
        pauseTimeout = setTimeout(() => { direction = -1; scrollPaused = false; }, AUTO_SCROLL_PAUSE);
      }
      if (container.scrollTop <= 1 && direction === -1) {
        scrollPaused = true;
        clearTimeout(pauseTimeout);
        pauseTimeout = setTimeout(() => { direction = 1; scrollPaused = false; }, AUTO_SCROLL_PAUSE);
      }
    }
    requestAnimationFrame(scrollStep);
  }
  requestAnimationFrame(scrollStep);
}

// ===== HELPERS =====
function formatTime(d) {
  return d.toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: GALAPAGOS_TZ }).toUpperCase();
}
function isSameDay(a, b) { return a.toDateString() === b.toDateString(); }
function getRelativeDay(d) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((target - today) / 86400000);
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Mañana';
  if (diff === -1) return 'Ayer';
  const name = d.toLocaleDateString('es-EC', { weekday: 'long', timeZone: GALAPAGOS_TZ });
  return name.charAt(0).toUpperCase() + name.slice(1);
}
function isHappeningNow(ev, now) { return ev.dtstart <= now && ev.dtend && ev.dtend >= now; }
function stripEmojis(s) {
  if (!s) return s;
  return s.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{200D}\u{20E3}\u{E0020}-\u{E007F}]/gu, '').replace(/\s{2,}/g, ' ').trim();
}
function cleanTitle(s) { return stripEmojis(s) || 'Evento'; }
function detectType(summary) {
  const s = summary.toLowerCase();
  if (s.includes('coloquio') || s.includes('taller') || s.includes('charla') || s.includes('seminario')) return 'academico';
  if (s.includes('club') || s.includes('training') || s.includes('creative')) return 'club';
  if (s.includes('basket') || s.includes('peloteo') || s.includes('jiu') || s.includes('alfa')) return 'deporte';
  if (s.includes('pelis') || s.includes('pizza') || s.includes('celebra') || s.includes('almuerzo')) return 'social';
  if (s.includes('mental') || s.includes('salud') || s.includes('bienestar') || s.includes('yoga')) return 'bienestar';
  return 'evento';
}
function showStatus(msg) {
  const el = document.getElementById('statusBadge');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideStatus() { document.getElementById('statusBadge').classList.remove('visible'); }

// ===== TIDES — NOAA API =====
async function fetchTides() {
  try {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-CA', { timeZone: GALAPAGOS_TZ }).replace(/-/g, '');
    const url = `${NOAA_ENDPOINT}?begin_date=${dateStr}&end_date=${dateStr}&station=${NOAA_STATION}&product=predictions&datum=MLLW&time_zone=lst&interval=hilo&units=metric&format=json`;
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error('NOAA API error ' + resp.status);
    const data = await resp.json();
    if (data.predictions && data.predictions.length > 0) {
      renderTides(data.predictions);
    } else { renderTidesFallback(); }
  } catch (e) {
    console.warn('NOAA tides error:', e);
    renderTidesFallback();
  }
}

function renderTides(predictions) {
  const container = document.getElementById('tidesContent');
  const badge = document.getElementById('tideBadge');
  const now = new Date();
  let nextIdx = -1;
  for (let i = 0; i < predictions.length; i++) {
    const tideTime = parseTideTime(predictions[i].t);
    if (tideTime > now) { nextIdx = i; break; }
  }
  let tidePhase = 'rising';
  if (nextIdx >= 0) { tidePhase = predictions[nextIdx].type === 'H' ? 'rising' : 'falling'; }
  badge.textContent = tidePhase === 'rising' ? 'Subiendo' : 'Bajando';
  badge.className = 'tide-badge ' + tidePhase;
  badge.style.display = 'inline-block';
  let html = '<div class="tides-list">';
  predictions.forEach((p, i) => {
    const isHigh = p.type === 'H';
    const isNext = i === nextIdx;
    const height = parseFloat(p.v).toFixed(2);
    const timeParts = p.t.split(' ');
    const timeStr = timeParts[1];
    const tideTime = parseTideTime(p.t);
    const isPast = tideTime < now;
    html += `
      <div class="tide-entry ${isHigh ? 'type-high' : 'type-low'}${isNext ? ' is-next' : ''}" style="${isPast && !isNext ? 'opacity: 0.4;' : ''}">
        <div class="tide-icon">${isHigh
          ? '<svg viewBox="0 0 24 20" fill="none"><path d="M2 10c2-3 4-5 6-5s4 2 6 5 4 5 6 5" stroke="#00E5E0" stroke-width="2" stroke-linecap="round"/><path d="M2 16c2-2 4-4 6-4s4 2 6 4 4 4 6 4" stroke="#00E5E0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/><path d="M10 2l2-2 2 2" stroke="#00E5E0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="1" x2="12" y2="8" stroke="#00E5E0" stroke-width="2" stroke-linecap="round"/></svg>'
          : '<svg viewBox="0 0 24 20" fill="none"><path d="M2 6c2-2 4-3 6-3s4 1 6 3 4 3 6 3" stroke="#3BB5F0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/><path d="M2 12c2-2 4-3 6-3s4 1 6 3 4 3 6 3" stroke="#3BB5F0" stroke-width="2" stroke-linecap="round"/><path d="M10 19l2 2 2-2" stroke="#3BB5F0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="20" x2="12" y2="13" stroke="#3BB5F0" stroke-width="2" stroke-linecap="round"/></svg>'
        }</div>
        <div class="tide-info">
          <span class="tide-type">${isHigh ? 'Pleamar' : 'Bajamar'}${isNext ? ' — próxima' : ''}</span>
          <span class="tide-time">${timeStr} h</span>
        </div>
        <div class="tide-height">${height} <span class="th-unit">m</span></div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function parseTideTime(tStr) {
  const [datePart, timePart] = tStr.split(' ');
  return new Date(`${datePart}T${timePart}:00-06:00`);
}

  badge.style.display = 'inline-block';
}

// ===== CMS EVENTS API (posters) =====
async function fetchCMSPosters() {
  try {
    const now = new Date();
    const from = now.toLocaleDateString('en-CA', { timeZone: GALAPAGOS_TZ });
    const until = new Date(now.getTime() + 7 * 86400000).toLocaleDateString('en-CA', { timeZone: GALAPAGOS_TZ });
    const url = `${CMS_API}?from=${from}&until=${until}&_t=${Date.now()}`;
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error('CMS API error ' + resp.status);
    const data = await resp.json();
    if (data.ok && data.events && data.events.length > 0) {
      cmsPosters = data.events;
      buildCarouselSlides();
    }
  } catch (e) {
    console.warn('CMS posters error:', e);
  }
}

function buildCarouselSlides() {
  const carousel = document.getElementById('bottomCarousel');
  const dotsContainer = document.getElementById('carouselDots');

  // Remove old CMS slides
  carousel.querySelectorAll('.carousel-slide.cms-slide').forEach(el => el.remove());

  // Add CMS poster slides
  cmsPosters.forEach((poster, i) => {
    const slide = document.createElement('div');
    slide.className = 'carousel-slide cms-slide';
    const eventDate = new Date(poster.event_date + 'T12:00:00-06:00');
    const dateStr = eventDate.toLocaleDateString('es-EC', { day: 'numeric', month: 'long', timeZone: GALAPAGOS_TZ });
    slide.innerHTML = `
      <div class="cms-poster">
        <img class="cms-poster-img" src="${poster.image_url}" alt="${stripEmojis(poster.title) || ''}" loading="lazy">
        <div class="cms-poster-title">${stripEmojis(poster.title)}</div>
        <div class="cms-poster-date">${dateStr}</div>
      </div>`;
    carousel.insertBefore(slide, dotsContainer);
  });

  initCarousel();
}

let carouselTimer = null;
function initCarousel() {
  const carousel = document.getElementById('bottomCarousel');
  const slides = carousel.querySelectorAll('.carousel-slide');
  const dotsContainer = document.getElementById('carouselDots');

  if (slides.length <= 1) {
    dotsContainer.innerHTML = '';
    return;
  }

  // Build dots
  dotsContainer.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    dotsContainer.appendChild(dot);
  });

  let current = 0;
  if (carouselTimer) clearInterval(carouselTimer);
  carouselTimer = setInterval(() => {
    slides[current].classList.remove('active');
    dotsContainer.children[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
    dotsContainer.children[current].classList.add('active');
  }, CAROUSEL_INTERVAL);
}

// ===== INIT =====
async function init() {
  initPhotoSlideshow();
  const [_cal, _tides, _cms] = await Promise.allSettled([fetchCalendar(), fetchTides(), fetchCMSPosters()]);
  renderEvents();
  setupAutoScroll();
  setInterval(async () => { await fetchCalendar(); renderEvents(); }, REFRESH_INTERVAL);
  setInterval(fetchTides, 3600000);
  setInterval(fetchCMSPosters, CMS_REFRESH_MS);
  setInterval(() => { renderEvents(); }, 60000);
}
init();
</script>
